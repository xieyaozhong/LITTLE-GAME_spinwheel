<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
  <meta name="theme-color" content="#120f2d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>PIXEL PACHINKO</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="machine">
    <div class="title">PIXEL PACHINKO</div>

    <section class="hud">
      <div class="hud-box">
        <div class="hud-label">SCORE</div>
        <div class="hud-value" id="score">000000</div>
      </div>
      <div class="hud-box">
        <div class="hud-label">BALLS</div>
        <div class="hud-value" id="balls">50</div>
      </div>
      <div class="hud-box">
        <div class="hud-label">COMBO</div>
        <div class="hud-value" id="combo">x1</div>
      </div>
      <div class="hud-box">
        <div class="hud-label">HIGH</div>
        <div class="hud-value" id="high">000000</div>
      </div>
    </section>

    <div class="game-wrap">
      <canvas id="game" width="720" height="920"></canvas>
      <div class="marquee" id="marquee" role="status" aria-live="polite">調整力度，按下發射！</div>
    </div>

    <section class="control-panel" aria-label="遊戲控制區">
      <div class="power-control">
        <label class="power-label" for="powerSlider">力度</label>
        <input id="powerSlider" type="range" min="20" max="100" value="55" step="1" aria-label="發射力度" />
        <output class="power-value" id="powerValue" for="powerSlider">55%</output>
      </div>

      <div class="controls">
        <button id="launchBtn" aria-label="發射彈珠"><span class="button-icon">▲</span>發射彈珠</button>
        <button id="autoBtn" class="secondary" aria-pressed="false"><span class="button-icon">∞</span>自動：關</button>
        <button id="resetBtn" class="secondary"><span class="button-icon">↻</span>重新開始</button>
      </div>
    </section>

    <details class="help">
      <summary>玩法說明</summary>
      <p>調整發射力度後按下「發射彈珠」，也可以直接點擊遊戲畫面發射。彈珠撞擊釘子會得分，落入中央 JACKPOT 槽可獲得最高分與額外 10 顆彈珠。這是純娛樂遊戲，不涉及真實金錢。</p>
    </details>
    <div class="rotate-note">手機直向最適合遊玩，也支援橫向畫面。</div>
  </main>

  <script src="game.js" defer></script>
</body>
</html>
