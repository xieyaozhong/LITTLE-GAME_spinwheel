name: Apply coffee flavor effects

on:
  push:
    paths:
      - .github/workflows/fix-mobile-long-press.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-coffee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch coffee page only
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path("coffee/index.html")
          text = path.read_text(encoding="utf-8")

          replacements = {
            '.ringbox{position:relative;width:270px;height:270px;display:grid;place-items:center}': '.ringbox{position:relative;width:330px;height:330px;display:grid;place-items:center}',
            '.target{width:205px;height:205px;border:9px dashed rgba(255,242,207,.34)}': '.target{width:255px;height:255px;border:10px dashed rgba(255,242,207,.34);transition:border-color .2s,filter .2s}',
            '.pulse{width:90px;height:90px;border:10px solid var(--mint);box-shadow:0 0 28px rgba(143,227,194,.55);transform:scale(.3)}': '.pulse{width:122px;height:122px;border:11px solid var(--mint);box-shadow:0 0 34px rgba(143,227,194,.6);transform:scale(.3);transition:border-color .16s,box-shadow .16s,filter .16s}',
            '.charge{width:210px;height:210px;border:10px solid var(--berry);opacity:0;transform:scale(.25);box-shadow:0 0 24px rgba(255,138,160,.5)}': '.charge{width:278px;height:278px;border:12px solid var(--berry);opacity:0;transform:scale(.22);box-shadow:0 0 30px rgba(255,138,160,.55);transition:border-color .16s,box-shadow .16s,filter .16s}',
            '@keyframes charge{to{transform:scale(1.18);filter:hue-rotate(45deg)}}': '@keyframes charge{to{transform:scale(1.27);filter:brightness(1.15)}}',
            '@media(max-height:720px){.game{min-height:410px}.scene{min-height:250px}.ringbox{transform:scale(.86)}}': '@media(max-height:720px){.game{min-height:410px}.scene{min-height:270px}.ringbox{transform:scale(.76)}}',
          }
          for old, new in replacements.items():
              text = text.replace(old, new)

          marker = '@keyframes charge{to{transform:scale(1.27);filter:brightness(1.15)}}'
          effects = r'''@keyframes charge{to{transform:scale(1.27);filter:brightness(1.15)}}
.scene::before,.scene::after{content:"";position:absolute;left:50%;top:50%;width:9px;height:9px;opacity:0;pointer-events:none;z-index:1;transform:translate(-50%,-50%)}
.scene.fx-fruit .pulse{border-color:#ffb347;box-shadow:0 0 24px #ff8a65,0 0 55px rgba(255,211,102,.75)}.scene.fx-fruit .charge{border-color:#ff6f61;box-shadow:0 0 28px #ff6f61,0 0 64px rgba(255,179,71,.65)}.scene.fx-fruit::before{opacity:.95;background:#ff6f61;box-shadow:-82px -38px #ffd166,72px -52px #ff8a65,-96px 42px #ffb347,88px 54px #ff6f61,0 -100px #fff2a8;animation:fruitSpark .75s steps(4) infinite}@keyframes fruitSpark{50%{transform:translate(-50%,-50%) scale(1.8) rotate(24deg);filter:brightness(1.35)}}
.scene.fx-floral .pulse{border-color:#f6a6ff;box-shadow:0 0 28px #f6a6ff,0 0 65px rgba(190,150,255,.72)}.scene.fx-floral .charge{border-color:#ffb8e8;box-shadow:0 0 34px #ffb8e8,0 0 72px rgba(217,176,255,.7)}.scene.fx-floral::before,.scene.fx-floral::after{opacity:.8;border-radius:50%;background:#ffd2f1;box-shadow:-75px -18px 0 3px #e4c3ff,66px -48px 0 2px #ffd2f1,-48px 68px 0 4px #f8e6ff,82px 52px 0 3px #e4c3ff;animation:floralFloat 2.2s ease-in-out infinite}.scene.fx-floral::after{animation-delay:-1.1s;transform:translate(-50%,-50%) rotate(45deg)}@keyframes floralFloat{50%{transform:translate(-50%,-70%) rotate(28deg) scale(1.25);opacity:.35}}
.scene.fx-sweet .pulse{border-color:#ffd56a;box-shadow:0 0 26px #ffd56a,0 0 62px rgba(255,190,70,.75)}.scene.fx-sweet .charge{border-color:#ffbf45;border-style:dotted;box-shadow:0 0 32px #ffbf45,0 0 72px rgba(255,213,106,.72)}.scene.fx-sweet::before{opacity:1;background:#fff0a8;box-shadow:-90px -38px #ffd56a,90px -32px #fff0a8,-72px 64px #ffbf45,72px 70px #ffd56a,0 -105px #fff6c7;animation:sugarTwinkle .58s steps(2) infinite}@keyframes sugarTwinkle{50%{transform:translate(-50%,-50%) scale(2);opacity:.35}}
.scene.fx-body .pulse{border-color:#c98145;box-shadow:0 0 24px #c98145,0 0 58px rgba(109,63,42,.85)}.scene.fx-body .charge{border-color:#9b5b36;border-style:double;box-shadow:0 0 24px #9b5b36,0 0 58px rgba(189,111,66,.7);animation-duration:1.9s}.scene.fx-body .target{border-color:rgba(255,213,106,.6);filter:drop-shadow(0 0 12px #6d3f2a)}.scene.fx-body::before{opacity:.6;width:18px;height:18px;border:5px solid #c98145;border-radius:50%;box-shadow:-82px 0 0 -2px #8d5437,82px 0 0 -2px #8d5437,0 -86px 0 -2px #dca56d,0 86px 0 -2px #6d3f2a;animation:bodyThrob 1.5s ease-in-out infinite}@keyframes bodyThrob{50%{transform:translate(-50%,-50%) scale(1.35);opacity:.25}}
.scene.fx-mature .pulse{border-color:#d679b7;box-shadow:0 0 26px #d679b7,0 0 62px rgba(112,49,103,.82)}.scene.fx-mature .charge{border-color:#8d3d70;border-style:dashed;box-shadow:0 0 30px #8d3d70,0 0 76px rgba(97,40,88,.78)}.scene.fx-mature::before,.scene.fx-mature::after{opacity:.58;width:70px;height:18px;border-radius:50%;background:rgba(181,99,157,.45);filter:blur(6px);animation:matureSmoke 2.4s ease-in-out infinite}.scene.fx-mature::after{animation-delay:-1.2s}@keyframes matureSmoke{0%,100%{transform:translate(-110%,-30%) rotate(-12deg)}50%{transform:translate(10%,-130%) rotate(16deg);opacity:.18}}
.scene.fx-muted .pulse{border-color:#8ca5b3;box-shadow:0 0 18px #708995,0 0 42px rgba(85,105,116,.5);filter:saturate(.55)}.scene.fx-muted .charge{border-color:#667983;box-shadow:0 0 20px #667983;filter:saturate(.45);animation-duration:2.25s}.scene.fx-muted::before{opacity:.5;width:5px;height:5px;background:#9bb0ba;box-shadow:-72px -48px #6f858f,78px -35px #9bb0ba,-88px 55px #708995,84px 62px #52656e;animation:mutedDrift 1.8s linear infinite}@keyframes mutedDrift{50%{transform:translate(-50%,-30%) rotate(180deg);opacity:.18}}'''
          if 'scene.fx-fruit' not in text and marker in text:
              text = text.replace(marker, effects, 1)

          text = text.replace('｜現在放開！', '')
          text = text.replace('現在放開', '')
          text = text.replace('✨ ${item.cat}', '${item.cat}')
          text = text.replace('看到最佳詞放開', '選到喜歡的風味放開')
          text = text.replace('出現金色提示時放開。', '遇到喜歡的風味細項時放開。')
          text = text.replace('出現金色「」時立即鬆手。', '遇到喜歡的風味細項時放開。')

          display_pattern = re.compile(
              r'E\.word\.innerHTML=item\.s>=95\?.*?;E\.word\.classList\.toggle\("best",item\.s>=95\);tone\(330\+i\*28,\.035\);',
              re.S,
          )
          display_replacement = 'E.word.innerHTML=`<span>${item.cat}</span><small>${item.detail}</small>`;E.word.classList.remove("best");let fx=["fx-fruit","fx-floral","fx-sweet","fx-body","fx-mature","fx-muted"];fx.forEach(c=>E.scene.classList.remove(c));let effect=["果香","果甜","酸質"].includes(item.cat)?"fx-fruit":item.cat==="花香"?"fx-floral":["甜香","甜感","糖香","回甘"].includes(item.cat)?"fx-sweet":["口感","平衡","醇厚","烘焙","堅果","餘韻"].includes(item.cat)?"fx-body":["發酵香","酒香","煙燻","香料"].includes(item.cat)?"fx-mature":"fx-muted";E.scene.classList.add(effect);tone(330+i*28,.035);'
          text, count = display_pattern.subn(display_replacement, text, count=1)
          if count == 0 and 'let fx=["fx-fruit"' not in text:
              raise SystemExit('Flavor display code was not found')

          release_old = 'E.word.classList.remove("active","best");E.word.textContent=`抓到：${S.word}`;'
          release_new = 'E.word.classList.remove("active","best");E.word.textContent=`抓到：${S.word}`;setTimeout(()=>["fx-fruit","fx-floral","fx-sweet","fx-body","fx-mature","fx-muted"].forEach(c=>E.scene.classList.remove(c)),420);'
          if release_old in text:
              text = text.replace(release_old, release_new, 1)

          path.write_text(text, encoding="utf-8")
          PY

          grep -q 'scene.fx-fruit' coffee/index.html
          grep -q 'width:330px;height:330px' coffee/index.html
          if grep -q '現在放開' coffee/index.html; then
            echo 'Prompt still present' >&2
            exit 1
          fi

      - name: Commit coffee-only update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coffee/index.html
          if ! git diff --cached --quiet; then
            git commit -m "Add category effects and enlarge coffee ring"
            git push
          fi
