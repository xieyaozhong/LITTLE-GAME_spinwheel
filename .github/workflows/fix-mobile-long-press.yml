name: Separate coffee game from original wheel

on:
  push:
    paths:
      - .github/workflows/fix-mobile-long-press.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  separate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move coffee game and restore wheel homepage
        run: |
          mkdir -p coffee
          cp index.html coffee/index.html
          git show 72805ce62fc6686a08250fe925e59cb2e266d248:index.html > index.html

      - name: Commit separated games
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html coffee/index.html
          if ! git diff --cached --quiet; then
            git commit -m "Keep original wheel and move coffee game to subpage"
            git push
          fi
