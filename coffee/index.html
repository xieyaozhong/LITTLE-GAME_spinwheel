<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#211511">
<title>像素咖啡品味所</title>
<link rel="stylesheet" href="style.css?v=2">
<link rel="stylesheet" href="word-effects.css?v=1">
<link rel="stylesheet" href="polish.css?v=1">
<link rel="stylesheet" href="result-feedback.css?v=1">
<link rel="stylesheet" href="result-unified.css?v=1">
</head>
<body>
<main class="app">
<header class="panel">
<h1>☕ 像素咖啡品味所</h1>
<p>探索更細緻的香氣、口感與餘韻，遇到喜歡的風味就放開</p>
</header>
<section class="panel status" id="status">
<div><div class="stage" id="stage">準備品飲</div><div class="desc" id="desc">光圈與風味會持續循環，不必急著放開。</div></div>
<div class="count" id="count">0 / 6</div>
</section>
<section class="panel game" id="game">
<div class="scene" id="scene">
<div class="word" id="word"><span>按住探索風味</span><small>更多大類與細項會輪流出現</small></div>
<div class="particles" id="particles"></div>
<div class="ringbox">
<div class="target"></div><div class="pulse" id="pulse"></div><div class="charge"></div>
<div class="cup"><div class="steam"><i></i><i></i><i></i></div><div class="face"></div></div>
</div>
</div>
<div class="hint" id="hint"><b>按下「開始品飲」</b><span>每個類別都有不同的色彩、粒子、光圈與文字框效果。</span></div>
<button class="hold" id="hold">開始品飲</button>
</section>
<section class="panel result hidden" id="result">
<div class="result-shell">
<div class="result-hero">
<div class="result-kicker">YOUR PIXEL COFFEE PROFILE</div>
<h2 id="title"></h2>
<div class="quote" id="quote"></div>
</div>
<div class="result-stack">
<section class="result-block">
<div class="block-heading"><span class="block-index">01</span><div class="block-copy"><b>風味指標</b><small>六項感官分數</small></div></div>
<div class="metrics" id="metrics"></div>
</section>
<section class="result-block">
<div class="block-heading"><span class="block-index">02</span><div class="block-copy"><b>風味輪廓</b><small>主要家族與三階段紀錄</small></div></div>
<div class="flavor-summary" id="flavorSummary"></div>
</section>
<section class="result-block">
<div class="block-heading"><span class="block-index">03</span><div class="block-copy"><b>本次捕捉</b><small>六次實際選到的細項</small></div></div>
<div class="tags" id="tags"></div>
</section>
</div>
<div class="result-footer">
<div class="actions"><button class="download" id="download">下載評測圖</button><button class="restart" id="restart">再品一杯</button></div>
<div class="result-preview">
<div class="preview-heading"><span>評測圖預覽</span><span>可下載分享</span></div>
<div class="canvasbox"><canvas id="canvas" width="900" height="1200"></canvas></div>
</div>
</div>
</div>
</section>
<footer>Pixel Coffee Lab · 咖啡風味探索實驗室</footer>
</main>
<div class="toast" id="toast"></div>
<script src="game.js?v=4"></script>
<script src="result-feedback.js?v=1"></script>
<script src="avatar-feedback.js?v=1"></script>
</body>
</html>
