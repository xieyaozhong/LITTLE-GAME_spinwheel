s:13px;padding:13px;font-weight:1000;cursor:pointer;transition:transform .15s,filter .15s,box-shadow .15s}button:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.08)}button:active:not(:disabled){transform:translateY(1px)}.start{background:linear-gradient(135deg,#48d7ff,#70efb6);color:#061019;box-shadow:0 10px 25px #48d7ff25}.pause{background:#ffffff10;color:white;border:1px solid #ffffff12}.reset{background:linear-gradient(135deg,#ff5879,#ef7147);color:white;box-shadow:0 10px 25px #ff587922}button:disabled{opacity:.42;cursor:not-allowed}.score{text-align:center;margin-top:11px;font-weight:1000}.score b:first-child{color:var(--blue)}.score b:last-child{color:var(--red)}.log{margin-top:15px;min-height:64px;color:#cbd4e8;font-size:13px;line-height:1.55}.legend{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.65}.chip{display:inline-block;padding:3px 8px;margin:0 5px 3px 0;border-radius:999px;border:1px solid #ffffff24;background:#ffffff0c}.gravity{color:#8fffc6}.inner{color:#a9d8ff}.outer{color:#ffd28b}.note{color:#7f8ba8;font-size:11px;margin-top:8px;line-height:1.45}@media(max-width:1020px){.grid{grid-template-columns:1fr 1fr}.center{grid-column:1/-1;grid-row:1}.side{position:static}}@media(max-width:660px){.app{padding:10px}header{display:block}.meta-badge{display:inline-block;margin-top:11px}.grid{grid-template-columns:1fr}.center{grid-column:auto}.btns{grid-template-columns:1fr 1fr}.start{grid-column:1/-1}.model-preview{height:92px}}

<body>
<main class="app">
<header><div><h1>旋刃競技場</h1><p class="sub">使用程式即時繪製多層陀螺模型、金屬高光、旋轉殘影與碰撞特效；重力碗面仍會把陀螺拉向中央。</p></div><div class="meta-badge">CANVAS MODELING V2</div></header>

<script>
const $=s=>document.querySelector(s),cv=$('#cv'),ctx=cv.getContext('2d'),over=$('#over'),log=$('#log');let W=700,H=700,outerR=290,innerR=215,dpr=1,running=false,paused=false,last=0,time=0,tops=[],particles=[],waves=[],score=[0,0],lastZoneLog=0,shake=0,flash=0;
const metaPresets={custom:{label:'自訂陀螺',name:'自訂陀螺',combo:'自由調整能力',rank:'—',type:'balance',a:70,d:68,s:72,w:68,b:66,spin:'R',shape:'balanced',primary:'#36c9ff',secondary:'#143f8f',accent:'#f3fbff',metal:'#d6e6f5'},shark:{label:'#1 Shark Scale',name:'Shark Scale',combo:'1-70 Low Rush',rank:'六月出場率 #1',type:'attack',a:99,d:66,s:72,w:89,b:69,spin:'R',shape:'shark',primary:'#7d3cff',secondary:'#16e2a1',accent:'#f2fffb',metal:'#b9c4cf'},wizard:{label:'#2 Wizard Rod',name:'Wizard Rod',combo:'1-60 Hexa',rank:'六月出場率 #2',type:'stamina',a:43,d:95,s:99,w:86,b:92,spin:'R',shape:'rod',primary:'#f6c33d',secondary:'#214bc6',accent:'#ffffff',metal:'#e6edf3'},aero:{label:'#3 Aero Pegasus',name:'Aero Pegasus',combo:'1-50 Rush',rank:'六月出場率 #3',type:'attack',a:97,d:72,s:76,w:91,b:73,spin:'R',shape:'pegasus',primary:'#e93751',secondary:'#f4c84e',accent:'#fff4d2',metal:'#d9e2ea'},dran:{label:'#4 Dran Strike',name:'Dran Strike',combo:'9-60 Kick',rank:'六月出場率 #4',type:'attack',a:96,d:70,s:68,w:89,b:72,spin:'R',shape:'dran',primary:'#2789ff',secondary:'#dc304b',accent:'#eaf6ff',metal:'#d8e1eb'},cobalt:{label:'#5 Cobalt Dragoon',name:'Cobalt Dragoon',combo:'9-60 Elevate',rank:'近期賽事快速上升',type:'balance',a:82,d:90,s:93,w:92,b:85,spin:'L',shape:'dragoon',primary:'#1254d8',secondary:'#7f41ff',accent:'#dce9ff',metal:'#c8d4e3'},silver:{label:'#6 Silver Wolf',name:'Silver Wolf',combo:'9-60 Free Ball',rank:'六月出場率 #6',type:'defense',a:55,d:96,s:96,w:92,b:91,spin:'R',shape:'wolf',primary:'#bfc8d2',secondary:'#47c6d8',accent:'#ffffff',metal:'#f1f5f8'},meteor:{label:'Meteor Dragoon',name:'Meteor Dragoon',combo:'7-60 Level',rank:'近期週榜前五',type:'balance',a:79,d:91,s:94,w:93,b:86,spin:'L',shape:'meteor',primary:'#1a43a3',secondary:'#d03cff',accent:'#f3dcff',metal:'#cbd5e1'}};
const cfg={p1:{...metaPresets.wizard,preset:'wizard'},p2:{...metaPresets.shark,preset:'shark'}},typeName={attack:'攻擊型',defense:'防禦型',stamina:'持久型',balance:'平衡型'},keys=[['a','攻擊'],['d','防禦'],['s','耐力'],['w','重量'],['b','爆裂抗性']];
function initials(name){return name.split(/\s+/).map(s=>s[0]).join('').slice(0,2).toUpperCase()||'X'}
function renderPanel(id){const c=cfg[id],el=$('#'+id);el.innerHTML=`<div class="model-preview" data-mark="${initials(c.name)}" style="--p1:${c.primary};--p2:${c.secondary};--metal:${c.metal};--accent:${c.accent}"><span class="preview-orbit"></span></div><div class="row"><label>競技預設</label><select data-k="preset">${Object.entries(metaPresets).map(([key,p])=>`<option value="${key}" ${key===c.preset?'selected':''}>${p.label}</option>`).join('')}</select></div><div class="combo-box"><strong>${c.name}・${c.combo}</strong>${c.rank}｜${c.spin==='L'?'左迴轉':'右迴轉'}<div class="combo-tags"><span>${typeName[c.type]}</span><span>${c.shape.toUpperCase()}</span><span>${c.spin}-SPIN</span></div></div><div class="row"><label>名稱</label><input data-k="name" type="text" maxlength="20" value="${c.name}"></div><div class="row"><label>類型</label><select data-k="type">${Object.entries(typeName).map(([v,n])=>`<option value="${v}" ${v===c.type?'selected':''}>${n}</option>`).join('')}</select></div>${keys.map(([k,n])=>`<div class="row"><label>${n}<span class="v" id="${id}${k}">${c[k]}</span></label><input data-k="${k}" type="range" min="${k==='w'?35:20}" max="100" value="${c[k]}"></div>`).join('')}`;el.oninput=e=>{const k=e.target.dataset.k;if(!k||k==='preset')return;c[k]=(k==='name'||k==='type')?e.target.value:+e.target.value;if(k!=='name'&&k!=='type')$('#'+id+k).textContent=c[k];$('#n'+(id==='p1'?1:2)).textContent=c.name||id;if(k!=='name'){c.preset='custom';c.combo='自由調整能力';c.rank='自訂數值'}};el.onchange=e=>{if(e.target.dataset.k==='preset'){const selected=metaPresets[e.target.value];cfg[id]={...selected,preset:e.target.value};renderPanel(id);$('#n'+(id==='p1'?1:2)).textContent=cfg[id].name}}}
renderPanel('p1');renderPanel('p2');
function resize(){const q=cv.getBoundingClientRect();W=q.width;H=q.height;dpr=Math.min(devicePixelRatio||1,2);cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);outerR=Math.min(W,H)*.445;innerR=outerR*.72}addEventListener('resize',resize);resize();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>Math.random()*(b-a)+a,mag=(a,b)=>Math.hypot(a,b);
function alpha(hex,a){const h=hex.replace('#',''),n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function lighten(hex,amount=.25){const h=hex.replace('#',''),n=parseInt(h,16),r=n>>16&255,g=n>>8&255,b=n&255;return`rgb(${Math.round(r+(255-r)*amount)},${Math.round(g+(255-g)*amount)},${Math.round(b+(255-b)*amount)})`}
function emit(px,py,color,count=18,power=1,kind='spark'){for(let i=0;i<count;i++){const a=rnd(0,Math.PI*2),s=rnd(35,190)*power;particles.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:rnd(.25,.75),color,r:rnd(.7,3.1),kind,rot:rnd(0,6.28)})}}
function wave(px,py,color,max=42){waves.push({x:px,y:py,color,r:3,max,l:1})}function addLog(text){log.textContent=text}

function drawScene(){ctx.clearRect(0,0,W,H);const sx=shake?rnd(-shake,shake):0,sy=shake?rnd(-shake,shake):0;ctx.save();ctx.translate(sx,sy);drawArenaBase();tops.forEach(t=>t.draw());drawEffects();ctx.restore();if(flash>0){ctx.fillStyle=`rgba(255,255,255,${flash*.22})`;ctx.fillRect(0,0,W,H)}}
function effects(dt){particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=p.kind==='streak'?.92:.96;p.vy*=p.kind==='streak'?.92:.96;p.l-=dt});particles=particles.filter(p=>p.l>0);waves.forEach(w=>{w.r+=(w.max-w.r)*dt*8;w.l-=dt*2.5});waves=waves.filter(w=>w.l>0);shake=Math.max(0,shake-dt*38);flash=Math.max(0,flash-dt*3.4)}function bars(){if(!tops.length)return;$('#e1').style.width=clamp(tops[0].energy,0,100)+'%';$('#e2').style.width=clamp(tops[1].energy,0,100)+'%'}function result(){if(tops.length<2)return;const[a,b]=tops;let loser=-1,why='';if(a.burst){loser=0;why='爆裂勝利'}else if(b.burst){loser=1;why='爆裂勝利'}else if(a.out){loser=0;why='極限出界勝利'}else if(b.out){loser=1;why='極限出界勝利'}else if(a.energy<=0&&mag(a.vx,a.vy)<24){loser=0;why='持久勝利'}else if(b.energy<=0&&mag(b.vx,b.vy)<24){loser=1;why='持久勝利'}else if(time>80){loser=a.energy<b.energy?0:1;why='時間判定'}if(loser<0)return;const win=1-loser;running=false;paused=false;score[win]++;$('#s1').textContent=score[0];$('#s2').textContent=score[1];$('#start').disabled=false;$('#start').textContent='再戰一場';$('#pause').disabled=true;over.classList.remove('hide');over.innerHTML=`<div><div class="big" style="color:${tops[win].c.primary}">${tops[win].c.name} 勝利</div><div class="small">${why}・${time.toFixed(1)} 秒</div></div>`;addLog(`${tops[win].c.name} 以「${why}」取得勝利！`)}function loop(ts){const dt=Math.min((ts-last)/1000||0,.022);last=ts;if(running&&!paused){time+=dt;tops[0].update(dt,tops[1]);tops[1].update(dt,tops[0]);collide(tops[0],tops[1]);effects(dt);bars();result()}else effects(dt);drawScene();requestAnimationFrame(loop)}
$('#start').onclick=()=>{tops=[new Top(0,cfg.p1),new Top(1,cfg.p2)];time=0;running=true;paused=false;particles=[];waves=[];shake=0;flash=0;$('#start').disabled=true;$('#pause').disabled=false;$('#pause').textContent='暫停';$('#n1').textContent=cfg.p1.name;$('#n2').textContent=cfg.p2.name;over.classList.remove('hide');over.innerHTML='<div><div class="big">3・2・1</div><div class="small">LET IT RIP!</div></div>';setTimeout(()=>over.classList.add('hide'),650);addLog(`${cfg.p1.name} ${cfg.p1.combo} 對決 ${cfg.p2.name} ${cfg.p2.combo}！`)};$('#pause').onclick=()=>{if(!running)return;paused=!paused;$('#pause').textContent=paused?'繼續':'暫停'};$('#reset').onclick=()=>{running=false;paused=false;tops=[];particles=[];waves=[];shake=0;flash=0;score=[0,0];$('#s1').textContent=$('#s2').textContent='0';$('#start').disabled=false;$('#start').textContent='開始戰鬥';$('#pause').disabled=true;$('#e1').style.width=$('#e2').style.width='100%';over.classList.remove('hide');over.innerHTML='<div><div class="big">READY</div><div class="small">選好陀螺後開始戰鬥</div></div>';addLog('模擬器已重置。所有模型與光影都由程式即時重繪。')};requestAnimationFrame(loop);
</script>
