<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>旋刃競技場｜戰鬥陀螺模擬器</title>
<style>
:root{--b:#070b15;--p:#111a2c;--l:#27334d;--t:#f5f7ff;--m:#9ba7c2;--c1:#41ccff;--c2:#ff5879}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,#153b69 0,transparent 30%),radial-gradient(circle at 90% 5%,#5b1834 0,transparent 27%),var(--b);color:var(--t);font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif}.app{max-width:1350px;margin:auto;padding:18px}h1{margin:0;font-size:clamp(28px,5vw,48px);letter-spacing:.08em}.sub{color:var(--m);margin:8px 0 18px}.grid{display:grid;grid-template-columns:280px minmax(400px,1fr) 280px;gap:16px}.card{background:linear-gradient(180deg,#172137ef,#0b101def);border:1px solid var(--l);border-radius:20px;box-shadow:0 18px 50px #0008;padding:16px}.side h2{margin:0 0 12px;font-size:18px}.row{margin:11px 0}.row label{display:flex;justify-content:space-between;font-size:13px;color:#dce3f2;margin-bottom:5px}.row input[type=text],select{width:100%;padding:9px;border-radius:10px;border:1px solid var(--l);background:#ffffff0d;color:white}.row option{background:#111a2c}.row input[type=range]{width:100%;accent-color:var(--a)}.v{color:var(--a);font-weight:900}.hud{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px;font-weight:900}.hud>div:last-child{text-align:right}.bar{height:9px;background:#ffffff12;border-radius:99px;overflow:hidden;margin-top:5px}.fill{height:100%;width:100%;background:linear-gradient(90deg,#5ce3a6,#ffd166,#ff5b74)}.arena{position:relative;aspect-ratio:1;border-radius:18px;overflow:hidden;border:1px solid #ffffff20}.arena canvas{width:100%;height:100%;display:block}.over{position:absolute;inset:0;display:grid;place-items:center;text-align:center;pointer-events:none;background:#0002}.over.hide{display:none}.big{font-size:clamp(34px,7vw,70px);font-weight:1000;text-shadow:0 4px 20px #000}.small{color:#d9e1f0;font-weight:700}.btns{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:9px;margin-top:11px}button{border:0;border-radius:12px;padding:12px;font-weight:900;cursor:pointer}.start{background:linear-gradient(135deg,#48d7ff,#70efb6);color:#061019}.pause{background:#ffffff12;color:white}.reset{background:linear-gradient(135deg,#ff5879,#ef7147);color:white}button:disabled{opacity:.45}.score{text-align:center;margin-top:10px;font-weight:900}.score b:first-child{color:var(--c1)}.score b:last-child{color:var(--c2)}#log{margin-top:14px;min-height:58px;color:#cbd4e8;font-size:13px;line-height:1.55}.legend{margin-top:9px;color:var(--m);font-size:12px;line-height:1.65}.zone-chip{display:inline-block;padding:2px 7px;margin:0 5px 3px 0;border-radius:999px;border:1px solid #ffffff24;background:#ffffff0c}.inner-chip{color:#a9d8ff}.outer-chip{color:#ffd28b}.gravity-chip{color:#8fffc6}@media(max-width:950px){.grid{grid-template-columns:1fr 1fr}.center{grid-column:1/-1;grid-row:1}}@media(max-width:620px){.app{padding:10px}.grid{grid-template-columns:1fr}.center{grid-column:auto}.btns{grid-template-columns:1fr 1fr}.start{grid-column:1/-1}}
</style>
</head>
<body>
<main class="app">
<h1>旋刃競技場</h1>
<p class="sub">碗狀重力會把陀螺拉回中央；盤緣通常會反彈，只有極強撞擊才可能翻出外層。</p>
<section class="grid">
<aside class="card side" style="--a:var(--c1)"><h2>🔵 藍方陀螺</h2><div id="p1"></div></aside>
<section class="center">
<div class="card">
<div class="hud"><div><span id="n1">蒼藍暴風</span><div class="bar"><div id="e1" class="fill"></div></div></div><span>VS</span><div><span id="n2">緋紅獠牙</span><div class="bar"><div id="e2" class="fill"></div></div></div></div>
<div class="arena"><canvas id="cv"></canvas><div id="over" class="over"><div><div class="big">READY</div><div class="small">按下開始戰鬥</div></div></div></div>
<div class="btns"><button id="start" class="start">開始戰鬥</button><button id="pause" class="pause" disabled>暫停</button><button id="reset" class="reset">重置</button></div>
<div class="score"><b>藍方 <span id="s1">0</span></b>　—　<b>紅方 <span id="s2">0</span></b></div>
</div>
<div id="log" class="card">系統已就緒。碗面重力會持續將陀螺拉向中央。</div>
<div class="legend"><span class="zone-chip gravity-chip">中央低點</span><span class="zone-chip inner-chip">主戰碗面</span><span class="zone-chip outer-chip">外層高坡</span>越靠近邊緣，回中心的力越強；一般撞牆會保留動量並反彈。</div>
</section>
<aside class="card side" style="--a:var(--c2)"><h2>🔴 紅方陀螺</h2><div id="p2"></div></aside>
</section>
</main>
<script>
const $=s=>document.querySelector(s),cv=$('#cv'),ctx=cv.getContext('2d'),over=$('#over'),log=$('#log');
let W=700,H=700,outerR=290,innerR=215,dpr=1,run=false,paused=false,last=0,time=0,tops=[],parts=[],waves=[],score=[0,0],lastZoneLog=0;
const cfg={p1:{name:'蒼藍暴風',type:'balance',a:70,d:65,s:72,w:68,b:65},p2:{name:'緋紅獠牙',type:'attack',a:84,d:52,s:57,w:61,b:56}};
const typeName={attack:'攻擊型',defense:'防禦型',stamina:'持久型',balance:'平衡型'};
const preset={attack:[88,48,54,60,55],defense:[56,88,66,82,76],stamina:[47,62,92,58,72],balance:[70,68,72,67,66]};
const keys=[['a','攻擊'],['d','防禦'],['s','耐力'],['w','重量'],['b','爆裂抗性']];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>Math.random()*(b-a)+a,mag=(a,b)=>Math.hypot(a,b);
function ui(id){const c=cfg[id],el=$('#'+id);el.innerHTML=`<div class="row"><label>名稱</label><input data-k="name" type="text" maxlength="12" value="${c.name}"></div><div class="row"><label>類型</label><select data-k="type">${Object.entries(typeName).map(([v,n])=>`<option value="${v}" ${v===c.type?'selected':''}>${n}</option>`).join('')}</select></div>`+keys.map(([k,n])=>`<div class="row"><label>${n}<span class="v" id="${id}${k}">${c[k]}</span></label><input data-k="${k}" type="range" min="${k==='w'?35:20}" max="100" value="${c[k]}"></div>`).join('');el.oninput=e=>{const k=e.target.dataset.k;if(!k)return;c[k]=(k==='name'||k==='type')?e.target.value:+e.target.value;if(k!=='name'&&k!=='type')$('#'+id+k).textContent=c[k];$('#n'+(id==='p1'?1:2)).textContent=c.name||id};el.onchange=e=>{if(e.target.dataset.k!=='type')return;const ar=preset[c.type];keys.forEach(([k],i)=>c[k]=ar[i]);ui(id)}}
ui('p1');ui('p2');
function size(){const q=cv.getBoundingClientRect();W=q.width;H=q.height;dpr=Math.min(devicePixelRatio||1,2);cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);outerR=Math.min(W,H)*.445;innerR=outerR*.72}
addEventListener('resize',size);size();
function emit(px,py,c,n=18,power=1){for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(35,180)*power;parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:rnd(.25,.75),c,r:rnd(.8,3.2)})}}
function wave(px,py,c,max=42){waves.push({x:px,y:py,c,r:3,max,l:1})}
function addLog(text){log.textContent=text}
class Top{
constructor(i,c){this.i=i;this.c={...c};this.col=i?'#ff5879':'#41ccff';this.r=10+c.w*.062;this.x=W/2+(i?1:-1)*innerR*.44;this.y=H/2+rnd(-innerR*.06,innerR*.06);this.phase=rnd(0,Math.PI*2);this.orbitDir=i?1:-1;this.zone='inner';this.rimCooldown=0;this.trail=[];this.out=false;this.burst=false;this.energy=100;this.burstMeter=0;this.angle=rnd(0,Math.PI*2);this.spin=20+c.s*.12;this.impactBoost=0;const launch=i?Math.PI+rnd(-.28,.28):rnd(-.28,.28),speed=104+c.a*.92;this.vx=Math.cos(launch)*speed;this.vy=Math.sin(launch)*speed}
applyBowlGravity(dt){const cx=W/2,cy=H/2,dx=this.x-cx,dy=this.y-cy,dist=mag(dx,dy)||1,nx=dx/dist,ny=dy/dist;let inward;if(dist<=innerR){const q=clamp(dist/innerR,0,1);inward=12+88*Math.pow(q,2.15)}else{const q=clamp((dist-innerR)/(outerR-innerR),0,1);inward=118+250*Math.pow(q,1.65)}const massFactor=.92+this.c.w/500;this.vx-=nx*inward*massFactor*dt;this.vy-=ny*inward*massFactor*dt}
applyTipBehavior(dt,opponent){const cx=W/2,cy=H/2,dx=this.x-cx,dy=this.y-cy,dist=mag(dx,dy)||1,nx=dx/dist,ny=dy/dist,tx=-ny*this.orbitDir,ty=nx*this.orbitDir;this.phase+=dt*(1+this.c.a/185);let tangent=0,radialBias=0;
if(this.c.type==='attack'){tangent=34+this.c.a*.20;radialBias=Math.sin(this.phase*2.7)*23;if(opponent&&!opponent.out&&!opponent.burst){const ox=opponent.x-this.x,oy=opponent.y-this.y,od=mag(ox,oy)||1;const pulse=Math.pow(Math.max(0,Math.sin(this.phase*2.05)),5)*(26+this.c.a*.58);this.vx+=ox/od*pulse*dt;this.vy+=oy/od*pulse*dt}}
else if(this.c.type==='defense'){tangent=20+this.c.d*.08;radialBias=-18}
else if(this.c.type==='stamina'){tangent=29+this.c.s*.13;radialBias=5}
else{tangent=29+this.c.a*.10+Math.sin(this.phase*1.8)*9;radialBias=Math.sin(this.phase*1.25)*12}
this.vx+=(tx*tangent+nx*radialBias)*dt;this.vy+=(ty*tangent+ny*radialBias)*dt}
update(dt,opponent){if(this.out||this.burst)return;this.rimCooldown=Math.max(0,this.rimCooldown-dt);this.impactBoost=Math.max(0,this.impactBoost-dt*80);this.applyBowlGravity(dt);this.applyTipBehavior(dt,opponent);let speed=mag(this.vx,this.vy);const zoneDrag=this.zone==='outer'?.22:.068;const staminaDrag=(100-this.c.s)*.00072;const drag=Math.max(.94,1-dt*(zoneDrag+staminaDrag));this.vx*=drag;this.vy*=drag;speed=mag(this.vx,this.vy);const maxSpeed=205+this.c.a*1.85+this.impactBoost;if(speed>maxSpeed){this.vx=this.vx/speed*maxSpeed;this.vy=this.vy/speed*maxSpeed;speed=maxSpeed}this.x+=this.vx*dt;this.y+=this.vy*dt;const drain=(.62+speed*.00125)*(116-this.c.s)/58*(this.zone==='outer'?1.42:1);this.energy-=drain*dt*2.05;this.spin=Math.max(0,this.spin-drain*dt*.13);this.angle+=this.spin*dt;this.trail.push({x:this.x,y:this.y,l:1});if(this.trail.length>(this.c.type==='attack'?28:22))this.trail.shift();this.trail.forEach(p=>p.l-=dt*(this.c.type==='stamina'?1.7:2.35));this.trail=this.trail.filter(p=>p.l>0);this.handleRims();if(this.energy<0)this.energy=0}
handleRims(){const cx=W/2,cy=H/2,dx=this.x-cx,dy=this.y-cy,dist=mag(dx,dy)||1,nx=dx/dist,ny=dy/dist,radial=this.vx*nx+this.vy*ny;
if(this.zone==='inner'&&dist>innerR-this.r*.45&&this.rimCooldown<=0){const carry=radial+this.impactBoost*.30;const climbThreshold=174+this.c.w*.38+this.c.d*.26;if(carry>climbThreshold){this.zone='outer';this.rimCooldown=.28;this.energy-=3;this.x=cx+nx*(innerR+this.r*.15);this.y=cy+ny*(innerR+this.r*.15);wave(this.x,this.y,'#ffd166',36);emit(this.x,this.y,'#ffd166',12,.65);if(performance.now()-lastZoneLog>700){addLog(`${this.c.name} 受到巨大衝擊，翻上外層高坡！`);lastZoneLog=performance.now()}}else{this.x=cx+nx*(innerR-this.r*.72);this.y=cy+ny*(innerR-this.r*.72);const restitution=.86+this.c.d*.0008;const reflected=Math.max(48,Math.abs(radial)*restitution);this.vx-=nx*(radial+reflected);this.vy-=ny*(radial+reflected);const tangentKick=10+this.c.s*.04;this.vx+=-ny*this.orbitDir*tangentKick;this.vy+=nx*this.orbitDir*tangentKick;this.energy-=Math.max(0,radial)*.009;this.rimCooldown=.11;wave(this.x,this.y,'#8fd8ff',30)}}
if(this.zone==='outer'){if(dist<innerR-this.r*.4&&radial<0){this.zone='inner';this.rimCooldown=.2;wave(this.x,this.y,'#8fffc6',28)}if(dist>outerR-this.r*.35&&this.rimCooldown<=0){const escapeEnergy=radial+this.impactBoost*.42;const escapeThreshold=278+this.c.w*.46+this.c.d*.34;if(escapeEnergy>escapeThreshold){this.out=true;emit(this.x,this.y,this.col,64,1.4);wave(this.x,this.y,this.col,64);addLog(`${this.c.name} 以極大速度翻出外層，正式出局！`)}else{this.x=cx+nx*(outerR-this.r*.75);this.y=cy+ny*(outerR-this.r*.75);const restitution=.91+this.c.d*.00045;const reflected=Math.max(70,Math.abs(radial)*restitution);this.vx-=nx*(radial+reflected);this.vy-=ny*(radial+reflected);this.energy-=Math.max(0,radial)*.014;this.rimCooldown=.14;wave(this.x,this.y,'#ffd38b',36);if(performance.now()-lastZoneLog>700){addLog(`${this.c.name} 撞上外層高牆後彈回！`);lastZoneLog=performance.now()}}}}
}
draw(){if(this.out||this.burst)return;this.trail.forEach((p,i)=>{const a=clamp(p.l,0,1)*(i/Math.max(1,this.trail.length))*.28;ctx.fillStyle=alpha(this.col,a);ctx.beginPath();ctx.arc(p.x,p.y,this.r*(.10+i/this.trail.length*.28),0,Math.PI*2);ctx.fill()});ctx.save();const wob=clamp((28-this.energy)/28,0,1)*3.2;ctx.translate(this.x+Math.sin(this.angle*.42)*wob,this.y+Math.cos(this.angle*.37)*wob);ctx.rotate(this.angle);ctx.shadowBlur=14;ctx.shadowColor=this.col;const spikes=this.c.type==='attack'?10:this.c.type==='defense'?6:8;ctx.beginPath();for(let i=0;i<spikes*2;i++){const a=i*Math.PI/spikes,r=i%2?this.r*.72:this.r,px=Math.cos(a)*r,py=Math.sin(a)*r;i?ctx.lineTo(px,py):ctx.moveTo(px,py)}ctx.closePath();const g=ctx.createRadialGradient(-3,-4,1,0,0,this.r);g.addColorStop(0,'#fff');g.addColorStop(.24,this.col);g.addColorStop(1,'#070a12');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#ffffff99';ctx.lineWidth=1.4;ctx.stroke();ctx.fillStyle='#09101d';ctx.beginPath();ctx.arc(0,0,this.r*.43,0,Math.PI*2);ctx.fill();ctx.strokeStyle=this.col;ctx.stroke();ctx.restore()}}
function alpha(hex,a){const h=hex.replace('#',''),n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function collide(a,b){if(a.out||b.out||a.burst||b.burst)return;const dx=b.x-a.x,dy=b.y-a.y,dist=mag(dx,dy),min=a.r+b.r;if(!dist||dist>=min)return;const nx=dx/dist,ny=dy/dist,overlap=min-dist;a.x-=nx*overlap/2;a.y-=ny*overlap/2;b.x+=nx*overlap/2;b.y+=ny*overlap/2;const rel=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;if(rel>0)return;const m1=a.c.w/55,m2=b.c.w/55;let impulse=-1.80*rel/(1/m1+1/m2);const attackFactor=1+(a.c.a+b.c.a)/520;impulse*=attackFactor;a.vx-=impulse/m1*nx;a.vy-=impulse/m1*ny;b.vx+=impulse/m2*nx;b.vy+=impulse/m2*ny;const power=Math.abs(rel)+impulse*.13;a.impactBoost=Math.max(a.impactBoost,power*(b.c.a/100));b.impactBoost=Math.max(b.impactBoost,power*(a.c.a/100));a.energy-=power*(122-a.c.d)*b.c.a/310000;b.energy-=power*(122-b.c.d)*a.c.a/310000;a.burstMeter+=power*(122-a.c.b)/850;b.burstMeter+=power*(122-b.c.b)/850;emit((a.x+b.x)/2,(a.y+b.y)/2,'#fff',Math.min(28,7+power/9),.78);wave((a.x+b.x)/2,(a.y+b.y)/2,'#fff',clamp(power*.19,20,52));[a,b].forEach(t=>{if(t.burstMeter>88&&Math.random()<(t.burstMeter-84)/560){t.burst=true;emit(t.x,t.y,t.col,76,1.7);addLog(`${t.c.name} 被強烈撞擊後爆裂！`)}})}
function drawArena(){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2;const g=ctx.createRadialGradient(cx,cy,2,cx,cy,outerR*1.08);g.addColorStop(0,'#40577c');g.addColorStop(.26,'#2c4161');g.addColorStop(.57,'#17283f');g.addColorStop(.72,'#26354b');g.addColorStop(.87,'#121a2a');g.addColorStop(1,'#070a12');ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.fill();for(let i=1;i<=5;i++){const r=innerR*i/5;ctx.strokeStyle=`rgba(184,220,255,${.035+i*.018})`;ctx.lineWidth=1+(i===5?2:0);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()}const well=ctx.createRadialGradient(cx,cy,0,cx,cy,innerR*.42);well.addColorStop(0,'rgba(100,255,198,.15)');well.addColorStop(1,'rgba(100,255,198,0)');ctx.fillStyle=well;ctx.beginPath();ctx.arc(cx,cy,innerR*.42,0,Math.PI*2);ctx.fill();ctx.save();ctx.shadowBlur=14;ctx.shadowColor='#7fcfff66';ctx.strokeStyle='#a9d8ffbb';ctx.lineWidth=7;ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);ctx.stroke();ctx.restore();ctx.fillStyle='#ffc66b12';ctx.beginPath();ctx.arc(cx,cy,outerR-4,0,Math.PI*2);ctx.arc(cx,cy,innerR+6,0,Math.PI*2,true);ctx.fill();const edge=ctx.createLinearGradient(cx-outerR,cy,cx+outerR,cy);edge.addColorStop(0,'#41ccff');edge.addColorStop(.5,'#f4f7ff');edge.addColorStop(1,'#ff5879');ctx.strokeStyle=edge;ctx.lineWidth=10;ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.stroke();ctx.fillStyle='#9dffcfaa';ctx.font='700 11px system-ui';ctx.textAlign='center';ctx.fillText('GRAVITY WELL',cx,cy+4);ctx.fillStyle='#dcecffaa';ctx.fillText('INNER RIDGE',cx,cy-innerR+22);ctx.fillStyle='#ffd38baa';ctx.fillText('OUTER HIGH WALL',cx,cy-outerR+22);waves.forEach(w=>{ctx.globalAlpha=clamp(w.l,0,1);ctx.strokeStyle=w.c;ctx.lineWidth=2;ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.stroke()});ctx.globalAlpha=1;tops.forEach(t=>t.draw());parts.forEach(p=>{ctx.globalAlpha=clamp(p.l*2,0,1);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1}
function effects(dt){parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.96;p.vy*=.96;p.l-=dt});parts=parts.filter(p=>p.l>0);waves.forEach(w=>{w.r+=(w.max-w.r)*dt*8;w.l-=dt*2.5});waves=waves.filter(w=>w.l>0)}
function bars(){if(!tops.length)return;$('#e1').style.width=clamp(tops[0].energy,0,100)+'%';$('#e2').style.width=clamp(tops[1].energy,0,100)+'%'}
function result(){if(tops.length<2)return;const [a,b]=tops;let loser=-1,why='';if(a.burst){loser=0;why='爆裂勝利'}else if(b.burst){loser=1;why='爆裂勝利'}else if(a.out){loser=0;why='極限出界勝利'}else if(b.out){loser=1;why='極限出界勝利'}else if(a.energy<=0&&mag(a.vx,a.vy)<24){loser=0;why='持久勝利'}else if(b.energy<=0&&mag(b.vx,b.vy)<24){loser=1;why='持久勝利'}else if(time>80){loser=a.energy<b.energy?0:1;why='時間判定'}if(loser<0)return;const win=1-loser;run=false;paused=false;score[win]++;$('#s1').textContent=score[0];$('#s2').textContent=score[1];$('#start').disabled=false;$('#start').textContent='再戰一場';$('#pause').disabled=true;over.classList.remove('hide');over.innerHTML=`<div><div class="big" style="color:${tops[win].col}">${tops[win].c.name} 勝利</div><div class="small">${why}・${time.toFixed(1)} 秒</div></div>`;addLog(`${tops[win].c.name} 以「${why}」取得勝利！`)}
function loop(ts){const dt=Math.min((ts-last)/1000||0,.022);last=ts;if(run&&!paused){time+=dt;tops[0].update(dt,tops[1]);tops[1].update(dt,tops[0]);collide(tops[0],tops[1]);effects(dt);bars();result()}else effects(dt);drawArena();requestAnimationFrame(loop)}
$('#start').onclick=()=>{tops=[new Top(0,cfg.p1),new Top(1,cfg.p2)];time=0;run=true;paused=false;parts=[];waves=[];$('#start').disabled=true;$('#pause').disabled=false;$('#pause').textContent='暫停';$('#n1').textContent=cfg.p1.name;$('#n2').textContent=cfg.p2.name;over.classList.remove('hide');over.innerHTML='<div><div class="big">3・2・1</div><div class="small">LET IT RIP!</div></div>';setTimeout(()=>over.classList.add('hide'),650);addLog(`${cfg.p1.name} 對決 ${cfg.p2.name}，重力碗面啟動！`)};
$('#pause').onclick=()=>{if(!run)return;paused=!paused;$('#pause').textContent=paused?'繼續':'暫停'};
$('#reset').onclick=()=>{run=false;paused=false;tops=[];parts=[];waves=[];score=[0,0];$('#s1').textContent=$('#s2').textContent='0';$('#start').disabled=false;$('#start').textContent='開始戰鬥';$('#pause').disabled=true;$('#e1').style.width=$('#e2').style.width='100%';over.classList.remove('hide');over.innerHTML='<div><div class="big">READY</div><div class="small">按下開始戰鬥</div></div>';addLog('模擬器已重置。重力會把陀螺拉回中央，盤緣多半會反彈。')};
requestAnimationFrame(loop);
</script>
