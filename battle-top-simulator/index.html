<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>旋刃競技場｜戰鬥陀螺模擬器</title><style>
:root{--b:#070b15;--p:#111a2c;--l:#27334d;--t:#f5f7ff;--m:#9ba7c2;--c1:#41ccff;--c2:#ff5879}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,#153b69 0,transparent 30%),radial-gradient(circle at 90% 5%,#5b1834 0,transparent 27%),var(--b);color:var(--t);font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif}.app{max-width:1350px;margin:auto;padding:18px}h1{margin:0;font-size:clamp(28px,5vw,48px);letter-spacing:.08em}.sub{color:var(--m);margin:8px 0 18px}.grid{display:grid;grid-template-columns:280px minmax(400px,1fr) 280px;gap:16px}.card{background:linear-gradient(180deg,#172137eF,#0b101deF);border:1px solid var(--l);border-radius:20px;box-shadow:0 18px 50px #0008;padding:16px}.side h2{margin:0 0 12px;font-size:18px}.row{margin:11px 0}.row label{display:flex;justify-content:space-between;font-size:13px;color:#dce3f2;margin-bottom:5px}.row input[type=text],select{width:100%;padding:9px;border-radius:10px;border:1px solid var(--l);background:#ffffff0d;color:white}.row option{background:#111a2c}.row input[type=range]{width:100%;accent-color:var(--a)}.v{color:var(--a);font-weight:900}.hud{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-bottom:10px;font-weight:900}.hud>div:last-child{text-align:right}.bar{height:9px;background:#ffffff12;border-radius:99px;overflow:hidden;margin-top:5px}.fill{height:100%;width:100%;background:linear-gradient(90deg,#5ce3a6,#ffd166,#ff5b74)}.arena{position:relative;aspect-ratio:1;border-radius:18px;overflow:hidden;border:1px solid #ffffff20}.arena canvas{width:100%;height:100%;display:block}.over{position:absolute;inset:0;display:grid;place-items:center;text-align:center;pointer-events:none;background:#0002}.over.hide{display:none}.big{font-size:clamp(38px,8vw,78px);font-weight:1000;text-shadow:0 4px 20px #000}.small{color:#d9e1f0;font-weight:700}.btns{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:9px;margin-top:11px}button{border:0;border-radius:12px;padding:12px;font-weight:900;cursor:pointer}.start{background:linear-gradient(135deg,#48d7ff,#70efb6);color:#061019}.pause{background:#ffffff12;color:white}.reset{background:linear-gradient(135deg,#ff5879,#ef7147);color:white}button:disabled{opacity:.45}.score{text-align:center;margin-top:10px;font-weight:900}.score b:first-child{color:var(--c1)}.score b:last-child{color:var(--c2)}#log{margin-top:14px;min-height:52px;color:#cbd4e8;font-size:13px}.note{color:var(--m);font-size:12px;line-height:1.5}@media(max-width:950px){.grid{grid-template-columns:1fr 1fr}.center{grid-column:1/-1;grid-row:1}}@media(max-width:620px){.app{padding:10px}.grid{grid-template-columns:1fr}.center{grid-column:auto}.btns{grid-template-columns:1fr 1fr}.start{grid-column:1/-1}}
</style></head><body><main class="app"><h1>旋刃競技場</h1><p class="sub">調整陀螺能力，觀察攻擊、防禦、重量與耐力如何改變勝負。</p><section class="grid">
<aside class="card side" style="--a:var(--c1)"><h2>🔵 藍方陀螺</h2><div id="p1"></div></aside>
<section class="center"><div class="card"><div class="hud"><div><span id="n1">蒼藍暴風</span><div class="bar"><div id="e1" class="fill"></div></div></div><span>VS</span><div><span id="n2">緋紅獠牙</span><div class="bar"><div id="e2" class="fill"></div></div></div></div><div class="arena"><canvas id="cv"></canvas><div id="over" class="over"><div><div class="big">READY</div><div class="small">按下開始戰鬥</div></div></div></div><div class="btns"><button id="start" class="start">開始戰鬥</button><button id="pause" class="pause" disabled>暫停</button><button id="reset" class="reset">重置</button></div><div class="score"><b>藍方 <span id="s1">0</span></b>　—　<b>紅方 <span id="s2">0</span></b></div></div><div id="log" class="card">系統已就緒。勝利方式：耗盡對手耐力、撞出場外或觸發爆裂。</div></section>
<aside class="card side" style="--a:var(--c2)"><h2>🔴 紅方陀螺</h2><div id="p2"></div></aside></section></main><script>
const $=s=>document.querySelector(s),cv=$('#cv'),x=cv.getContext('2d'),over=$('#over'),log=$('#log');let W,H,R,dpr,run=0,stop=0,last=0,time=0,tops=[],parts=[],score=[0,0],raf;
const cfg={p1:{name:'蒼藍暴風',type:'balance',a:70,d:65,s:72,w:68,b:65},p2:{name:'緋紅獠牙',type:'attack',a:84,d:52,s:57,w:61,b:56}};
const typeName={attack:'攻擊型',defense:'防禦型',stamina:'持久型',balance:'平衡型'},preset={attack:[88,48,54,60,55],defense:[56,88,66,82,76],stamina:[47,62,92,58,72],balance:[70,68,72,67,66]},keys=[['a','攻擊'],['d','防禦'],['s','耐力'],['w','重量'],['b','爆裂抗性']];
function ui(id){let c=cfg[id],el=$('#'+id);el.innerHTML=`<div class="row"><label>名稱</label><input data-k="name" type="text" maxlength="12" value="${c.name}"></div><div class="row"><label>類型</label><select data-k="type">${Object.entries(typeName).map(([v,n])=>`<option value="${v}" ${v==c.type?'selected':''}>${n}</option>`).join('')}</select></div>`+keys.map(([k,n])=>`<div class="row"><label>${n}<span class="v" id="${id}${k}">${c[k]}</span></label><input data-k="${k}" type="range" min="${k=='w'?35:20}" max="100" value="${c[k]}"></div>`).join('');el.oninput=e=>{let k=e.target.dataset.k;if(!k)return;c[k]=k=='name'||k=='type'?e.target.value:+e.target.value;if(k!='name'&&k!='type')$('#'+id+k).textContent=c[k];$('#n'+(id=='p1'?1:2)).textContent=c.name||id};el.onchange=e=>{if(e.target.dataset.k!='type')return;let ar=preset[c.type];keys.forEach(([k],i)=>c[k]=ar[i]);ui(id)}}ui('p1');ui('p2');
function size(){let q=cv.getBoundingClientRect();W=q.width;H=q.height;dpr=Math.min(devicePixelRatio||1,2);cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0);R=Math.min(W,H)*.42}onresize=size;size();const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>Math.random()*(b-a)+a,mag=(a,b)=>Math.hypot(a,b);
class Top{constructor(i,c){this.i=i;this.c={...c};this.col=i?'#ff5879':'#41ccff';this.r=20+c.w*.1;let side=i?1:-1;this.x=W/2+side*R*.48;this.y=H/2+rnd(-R*.12,R*.12);let an=i?Math.PI+rnd(-.6,.6):rnd(-.6,.6),sp=120+c.a*1.15;this.vx=Math.cos(an)*sp;this.vy=Math.sin(an)*sp;this.en=100;this.bm=0;this.an=rnd(0,6.28);this.spin=17+c.s*.1;this.out=this.burst=0;this.tr=[]}update(dt,o){if(this.out||this.burst)return;let cx=W/2,cy=H/2,dx=cx-this.x,dy=cy-this.y,di=mag(dx,dy)||1,s=mag(this.vx,this.vy),prof=this.c.type=='attack'?1.22:this.c.type=='defense'?.75:this.c.type=='stamina'?.65:.9;this.vx+=dx/di*22*dt;this.vy+=dy/di*22*dt;if(o&&!o.out&&!o.burst){let ox=o.x-this.x,oy=o.y-this.y,od=mag(ox,oy)||1;this.vx+=ox/od*this.c.a*.13*prof*dt;this.vy+=oy/od*this.c.a*.13*prof*dt}let drag=1-dt*(.09+(100-this.c.s)*.001);this.vx*=drag;this.vy*=drag;this.x+=this.vx*dt;this.y+=this.vy*dt;let drain=(.85+s*.0015)*(115-this.c.s)/55*(this.c.type=='stamina'?.62:1);this.en-=drain*dt*2.3;this.spin=Math.max(0,this.spin-drain*dt*.13);this.an+=this.spin*dt;this.tr.push([this.x,this.y,1]);if(this.tr.length>18)this.tr.shift();this.tr.forEach(p=>p[2]-=dt*2.7);this.tr=this.tr.filter(p=>p[2]>0);let ad=mag(this.x-cx,this.y-cy),edge=R-this.r;if(ad>edge){let nx=(this.x-cx)/ad,ny=(this.y-cy)/ad,esc=this.vx*nx+this.vy*ny,hold=this.c.d*.22+this.c.w*.18+this.en*.1;if(ad>R+this.r*.7||esc>hold+25){this.out=1;boom(this.x,this.y,this.col,50)}else{this.x=cx+nx*edge;this.y=cy+ny*edge;this.vx-=1.7*esc*nx;this.vy-=1.7*esc*ny;this.en-=Math.max(0,esc)*.02}}if(this.en<0)this.en=0}draw(){if(this.out||this.burst)return;this.tr.forEach((p,i)=>{x.fillStyle=this.col+Math.floor(p[2]*30).toString(16).padStart(2,'0');x.beginPath();x.arc(p[0],p[1],this.r*(.2+i/30),0,7);x.fill()});x.save();let wob=Math.max(0,(30-this.en)/30)*5;x.translate(this.x+Math.sin(this.an*.5)*wob,this.y);x.rotate(this.an);x.shadowBlur=20;x.shadowColor=this.col;x.beginPath();for(let i=0;i<16;i++){let a=i*Math.PI/8,r=i%2?this.r*.72:this.r,px=Math.cos(a)*r,py=Math.sin(a)*r;i?x.lineTo(px,py):x.moveTo(px,py)}x.closePath();let g=x.createRadialGradient(-6,-7,1,0,0,this.r);g.addColorStop(0,'white');g.addColorStop(.2,this.col);g.addColorStop(1,'#070a12');x.fillStyle=g;x.fill();x.strokeStyle='#ffffff80';x.lineWidth=2;x.stroke();x.fillStyle='#0a1020';x.beginPath();x.arc(0,0,this.r*.45,0,7);x.fill();x.strokeStyle=this.col;x.stroke();x.restore()}}
function hit(a,b){if(a.out||b.out||a.burst||b.burst)return;let dx=b.x-a.x,dy=b.y-a.y,di=mag(dx,dy),md=a.r+b.r;if(!di||di>=md)return;let nx=dx/di,ny=dy/di,ov=md-di;a.x-=nx*ov/2;a.y-=ny*ov/2;b.x+=nx*ov/2;b.y+=ny*ov/2;let rel=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;if(rel>0)return;let m1=a.c.w/55,m2=b.c.w/55,j=-1.75*rel/(1/m1+1/m2);a.vx-=j/m1*nx;a.vy-=j/m1*ny;b.vx+=j/m2*nx;b.vy+=j/m2*ny;let pow=Math.abs(rel)+j*.1;a.en-=pow*(120-a.c.d)*b.c.a/290000;b.en-=pow*(120-b.c.d)*a.c.a/290000;a.bm+=pow*(120-a.c.b)/800;b.bm+=pow*(120-b.c.b)/800;boom((a.x+b.x)/2,(a.y+b.y)/2,'#fff',Math.min(25,8+pow/10));[a,b].forEach(t=>{if(t.bm>80&&Math.random()<(t.bm-75)/500){t.burst=1;boom(t.x,t.y,t.col,80)}})}
function boom(px,py,c,n){for(let i=0;i<n;i++){let a=rnd(0,7),s=rnd(40,230);parts.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:rnd(.25,.7),c,r:rnd(1,4)})}}
function draw(){x.clearRect(0,0,W,H);let cx=W/2,cy=H/2,g=x.createRadialGradient(cx,cy,5,cx,cy,R*1.2);g.addColorStop(0,'#334465');g.addColorStop(.45,'#19243b');g.addColorStop(1,'#070a12');x.fillStyle=g;x.beginPath();x.arc(cx,cy,R,0,7);x.fill();x.strokeStyle='#ffffff18';x.lineWidth=2;for(let i=1;i<6;i++){x.beginPath();x.arc(cx,cy,R*i/5,0,7);x.stroke()}let eg=x.createLinearGradient(cx-R,cy,cx+R,cy);eg.addColorStop(0,'#41ccff');eg.addColorStop(.5,'#fff');eg.addColorStop(1,'#ff5879');x.strokeStyle=eg;x.lineWidth=10;x.beginPath();x.arc(cx,cy,R,0,7);x.stroke();tops.forEach(t=>t.draw());parts.forEach(p=>{x.globalAlpha=Math.max(0,p.l*2);x.fillStyle=p.c;x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fill()});x.globalAlpha=1}
function effects(dt){parts.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.96;p.vy*=.96;p.l-=dt});parts=parts.filter(p=>p.l>0)}function bars(){if(!tops.length)return;$('#e1').style.width=clamp(tops[0].en,0,100)+'%';$('#e2').style.width=clamp(tops[1].en,0,100)+'%'}function result(){let a=tops[0],b=tops[1],los=-1,why='';if(a.burst){los=0;why='爆裂勝利'}else if(b.burst){los=1;why='爆裂勝利'}else if(a.out){los=0;why='出界勝利'}else if(b.out){los=1;why='出界勝利'}else if(a.en<=0&&mag(a.vx,a.vy)<30){los=0;why='持久勝利'}else if(b.en<=0&&mag(b.vx,b.vy)<30){los=1;why='持久勝利'}else if(time>70){los=a.en<b.en?0:1;why='時間判定'}if(los<0)return;let win=1-los;run=0;stop=1;score[win]++;$('#s1').textContent=score[0];$('#s2').textContent=score[1];$('#start').disabled=0;$('#start').textContent='再戰一場';$('#pause').disabled=1;over.classList.remove('hide');over.innerHTML=`<div><div class="big" style="color:${tops[win].col}">${tops[win].c.name} 勝利</div><div class="small">${why}・${time.toFixed(1)} 秒</div></div>`;log.textContent=`${tops[win].c.name} 以「${why}」取得勝利！`}
function loop(ts){let dt=Math.min((ts-last)/1000||0,.025);last=ts;if(run&&!stop){time+=dt;tops[0].update(dt,tops[1]);tops[1].update(dt,tops[0]);hit(tops[0],tops[1]);effects(dt);bars();result()}else effects(dt);draw();raf=requestAnimationFrame(loop)}
$('#start').onclick=()=>{tops=[new Top(0,cfg.p1),new Top(1,cfg.p2)];time=0;run=1;stop=0;parts=[];$('#start').disabled=1;$('#pause').disabled=0;$('#pause').textContent='暫停';$('#n1').textContent=cfg.p1.name;$('#n2').textContent=cfg.p2.name;over.classList.remove('hide');over.innerHTML='<div><div class="big">3・2・1</div><div class="small">LET IT RIP!</div></div>';setTimeout(()=>over.classList.add('hide'),650);log.textContent=`${cfg.p1.name} 對決 ${cfg.p2.name}，戰鬥開始！`};$('#pause').onclick=()=>{if(!run)return;stop=!stop;$('#pause').textContent=stop?'繼續':'暫停'};$('#reset').onclick=()=>{run=stop=0;tops=[];parts=[];score=[0,0];$('#s1').textContent=$('#s2').textContent=0;$('#start').disabled=0;$('#start').textContent='開始戰鬥';$('#pause').disabled=1;$('#e1').style.width=$('#e2').style.width='100%';over.classList.remove('hide');over.innerHTML='<div><div class="big">READY</div><div class="small">按下開始戰鬥</div></div>';log.textContent='模擬器已重置。'};requestAnimationFrame(loop);
</script></body></html>
