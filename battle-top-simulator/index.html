<style>

<body>
<main class="app">
<header><div><h1>旋刃競技場</h1><p class="sub">重力碗面會將陀螺拉向中央；選擇 2026 年競技熱門陀螺，直接模擬不同戰術與碰撞。</p></div><div class="meta-badge">2026 年 6 月競技環境</div></header>
<section class="grid">
<aside class="card side" style="--accent:var(--blue)"><h2>🔵 藍方陀螺</h2><div id="p1"></div></aside>
<section class="center">
<div class="card"><div class="hud"><div><span id="n1">Wizard Rod</span><div class="bar"><div id="e1" class="fill"></div></div></div><span>VS</span><div><span id="n2">Shark Scale</span><div class="bar"><div id="e2" class="fill"></div></div></div></div><div class="arena"><canvas id="cv"></canvas><div id="over" class="over"><div><div class="big">READY</div><div class="small">選好陀螺後開始戰鬥</div></div></div></div><div class="btns"><button id="start" class="start">開始戰鬥</button><button id="pause" class="pause" disabled>暫停</button><button id="reset" class="reset">重置</button></div><div class="score"><b>藍方 <span id="s1">0</span></b>　—　<b>紅方 <span id="s2">0</span></b></div></div>
<div id="log" class="card log">系統已就緒。碗面重力會持續將陀螺拉向中央。</div><div class="legend"><span class="chip gravity">中央低點</span><span class="chip inner">主戰碗面</span><span class="chip outer">外層高坡</span>一般撞牆會高彈性反射；只有碰撞累積的巨大向外動量才有機會出界。</div><div class="note">競技預設是依公開賽事常見配裝轉換成模擬數值，並非官方能力值。</div>
</section>
<aside class="card side" style="--accent:var(--red)"><h2>🔴 紅方陀螺</h2><div id="p2"></div></aside>
</section>
</main>
<script>
const $=s=>document.querySelector(s),cv=$('#cv'),ctx=cv.getContext('2d'),over=$('#over'),log=$('#log');let W=700,H=700,outerR=290,innerR=215,dpr=1,running=false,paused=false,last=0,time=0,tops=[],particles=[],waves=[],score=[0,0],lastZoneLog=0;
const metaPresets={custom:{label:'自訂陀螺',name:'自訂陀螺',combo:'自由調整能力',rank:'—',type:'balance',a:70,d:68,s:72,w:68,b:66,spin:'R',shape:'balanced'},shark:{label:'#1 Shark Scale',name:'Shark Scale',combo:'1-70 Low Rush',rank:'六月出場率 #1',type:'attack',a:99,d:66,s:72,w:89,b:69,spin:'R',shape:'shark'},wizard:{label:'#2 Wizard Rod',name:'Wizard Rod',combo:'1-60 Hexa',rank:'六月出場率 #2',type:'stamina',a:43,d:95,s:99,w:86,b:92,spin:'R',shape:'rod'},aero:{label:'#3 Aero Pegasus',name:'Aero Pegasus',combo:'1-50 Rush',rank:'六月出場率 #3',type:'attack',a:97,d:72,s:76,w:91,b:73,spin:'R',shape:'pegasus'},dran:{label:'#4 Dran Strike',name:'Dran Strike',combo:'9-60 Kick',rank:'六月出場率 #4',type:'attack',a:96,d:70,s:68,w:89,b:72,spin:'R',shape:'dran'},cobalt:{label:'#5 Cobalt Dragoon',name:'Cobalt Dragoon',combo:'9-60 Elevate',rank:'近期賽事快速上升',type:'balance',a:82,d:90,s:93,w:92,b:85,spin:'L',shape:'dragoon'},silver:{label:'#6 Silver Wolf',name:'Silver Wolf',combo:'9-60 Free Ball',rank:'六月出場率 #6',type:'defense',a:55,d:96,s:96,w:92,b:91,spin:'R',shape:'wolf'},meteor:{label:'Meteor Dragoon',name:'Meteor Dragoon',combo:'7-60 Level',rank:'近期週榜前五',type:'balance',a:79,d:91,s:94,w:93,b:86,spin:'L',shape:'meteor'}};
const cfg={p1:{...metaPresets.wizard,preset:'wizard'},p2:{...metaPresets.shark,preset:'shark'}},typeName={attack:'攻擊型',defense:'防禦型',stamina:'持久型',balance:'平衡型'},keys=[['a','攻擊'],['d','防禦'],['s','耐力'],['w','重量'],['b','爆裂抗性']];
function renderPanel(id){const c=cfg[id],el=$('#'+id);el.innerHTML=`<div class="row"><label>競技預設</label><select data-k="preset">${Object.entries(metaPresets).map(([key,p])=>`<option value="${key}" ${key===c.preset?'selected':''}>${p.label}</option>`).join('')}</select></div><div class="combo-box"><strong>${c.name}・${c.combo}</strong>${c.rank}｜${c.spin==='L'?'左迴轉':'右迴轉'}</div><div class="row"><label>名稱</label><input data-k="name" type="text" maxlength="20" value="${c.name}"></div><div class="row"><label>類型</label><select data-k="type">${Object.entries(typeName).map(([v,n])=>`<option value="${v}" ${v===c.type?'selected':''}>${n}</option>`).join('')}</select></div>${keys.map(([k,n])=>`<div class="row"><label>${n}<span class="v" id="${id}${k}">${c[k]}</span></label><input data-k="${k}" type="range" min="${k==='w'?35:20}" max="100" value="${c[k]}"></div>`).join('')}`;el.oninput=e=>{const k=e.target.dataset.k;if(!k||k==='preset')return;c[k]=(k==='name'||k==='type')?e.target.value:+e.target.value;if(k!=='name'&&k!=='type')$('#'+id+k).textContent=c[k];$('#n'+(id==='p1'?1:2)).textContent=c.name||id;if(k!=='name'){c.preset='custom';c.combo='自由調整能力';c.rank='自訂數值'}};el.onchange=e=>{const k=e.target.dataset.k;if(k==='preset'){const selected=metaPresets[e.target.value];cfg[id]={...selected,preset:e.target.value};renderPanel(id);$('#n'+(id==='p1'?1:2)).textContent=cfg[id].name}}}
renderPanel('p1');renderPanel('p2');
function resize(){const q=cv.getBoundingClientRect();W=q.width;H=q.height;dpr=Math.min(devicePixelRatio||1,2);cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);outerR=Math.min(W,H)*.445;innerR=outerR*.72}addEventListener('resize',resize);resize();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v)),rnd=(a,b)=>Math.random()*(b-a)+a,mag=(a,b)=>Math.hypot(a,b);function emit(px,py,color,count=18,power=1){for(let i=0;i<count;i++){const a=rnd(0,Math.PI*2),s=rnd(35,180)*power;particles.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:rnd(.25,.75),color,r:rnd(.8,3.2)})}}function wave(px,py,color,max=42){waves.push({x:px,y:py,color,r:3,max,l:1})}function addLog(text){log.textContent=text}
class Top{constructor(index,data){this.index=index;this.c={...data};this.color=index?'#ff5879':'#41ccff';this.r=10+data.w*.062;this.x=W/2+(index?1:-1)*innerR*.44;this.y=H/2+rnd(-innerR*.06,innerR*.06);this.phase=rnd(0,Math.PI*2);this.orbitDir=data.spin==='L'?-1:1;this.zone='inner';this.rimCooldown=0;this.trail=[];this.out=false;this.burst=false;this.energy=100;this.burstMeter=0;this.angle=rnd(0,Math.PI*2);this.spin=(data.spin==='L'?-1:1)*(20+data.s*.12);this.impactBoost=0;const launch=index?Math.PI+rnd(-.28,.28):rnd(-.28,.28),speed=104+data.a*.92;this.vx=Math.cos(launch)*speed;this.vy=Math.sin(launch)*speed}
applyBowlGravity(dt){const cx=W/2,cy=H/2,dx=this.x-cx,dy=this.y-cy,dist=mag(dx,dy)||1,nx=dx/dist,ny=dy/dist;let inward;if(dist<=innerR){const q=clamp(dist/innerR,0,1);inward=12+88*Math.pow(q,2.15)}else{const q=clamp((dist-innerR)/(outerR-innerR),0,1);inward=118+250*Math.pow(q,1.65)}const massFactor=.92+this.c.w/500;this.vx-=nx*inward*massFactor*dt;this.vy-=ny*inward*massFactor*dt}
applyTipBehavior(dt,opponent){const cx=W/2,cy=H/2,dx=this.x-cx,dy=this.y-cy,dist=mag(dx,dy)||1,nx=dx/dist,ny=dy/dist,tx=-ny*this.orbitDir,ty=nx*this.orbitDir;this.phase+=dt*(1+this.c.a/185);let tangent=0,radialBias=0;if(this.c.type==='attack'){tangent=34+this.c.a*.20;radialBias=Math.sin(this.phase*2.7)*23;if(opponent&&!opponent.out&&!opponent.burst){const ox=opponent.x-this.x,oy=opponent.y-this.y,od=mag(ox,oy)||1,pulse=Math.pow(Math.max(0,Math.sin(this.phase*2.05)),5)*(26+this.c.a*.58);this.vx+=ox/od*pulse*dt;this.vy+=oy/od*pulse*dt}}else if(this.c.type==='defense'){tangent=20+this.c.d*.08;radialBias=-18}else if(this.c.type==='stamina'){tangent=29+this.c.s*.13;radialBias=5}else{tangent=29+this.c.a*.10+Math.sin(this.phase*1.8)*9;radialBias=Math.sin(this.phase*1.25)*12}if(this.c.shape==='shark')radialBias+=Math.sin(this.phase*4.2)*11;if(this.c.shape==='rod')radialBias-=8;if(this.c.shape==='pegasus')tangent+=8;if(this.c.shape==='dran')radialBias+=Math.max(0,Math.sin(this.phase*3.3))*12;if(this.c.shape==='wolf')radialBias-=10;if(this.c.shape==='dragoon'||this.c.shape==='meteor')tangent+=4;this.vx+=(tx*tangent+nx*radialBias)*dt;this.vy+=(ty*tangent+ny*radialBias)*dt}
update(dt,opponent){if(this.out||this.burst)return;this.rimCooldown=Math.max(0,this.rimCooldown-dt);this.impactBoost=Math.max(0,this.impactBoost-dt*80);this.applyBowlGravity(dt);this.applyTipBehavior(dt,opponent);let speed=mag(this.vx,this.vy);const zoneDrag=this.zone==='outer'?.22:.068,staminaDrag=(100-this.c.s)*.00072,drag=Math.max(.94,1-dt*(zoneDrag+staminaDrag));this.vx*=drag;this.vy*=drag;speed=mag(this.vx,this.vy);const maxSpeed=205+this.c.a*1.85+this.impactBoost;if(speed>maxSpeed){this.vx=this.vx/speed*maxSpeed;this.vy=this.vy/speed*maxSpeed;speed=maxSpeed}this.x+=this.vx*dt;this.y+=this.vy*dt;const drain=(.62+speed*.00125)*(116-this.c.s)/58*(this.zone==='outer'?1.42:1);this.energy-=drain*dt*2.05;this.spin+=(this.spin>0?-1:1)*drain*dt*.13;if(Math.abs(this.spin)<.2)this.spin=0;this.angle+=this.spin*dt;this.trail.push({x:this.x,y:this.y,l:1});if(this.trail.length>(this.c.type==='attack'?28:22))this.trail.shift();this.trail.forEach(p=>p.l-=dt*(this.c.type==='stamina'?1.7:2.35));this.trail=this.trail.filter(p=>p.l>0);this.handleRims();if(this.energy<0)this.energy=0}
handleRims(){const cx=W/2,cy=H/2,dx=this.x-cx,dy=this.y-cy,dist=mag(dx,dy)||1,nx=dx/dist,ny=dy/dist,radial=this.vx*nx+this.vy*ny;if(this.zone==='inner'&&dist>innerR-this.r*.45&&this.rimCooldown<=0){const carry=radial+this.impactBoost*.30,climbThreshold=174+this.c.w*.38+this.c.d*.26;if(carry>climbThreshold){this.zone='outer';this.rimCooldown=.28;this.energy-=3;this.x=cx+nx*(innerR+this.r*.15);this.y=cy+ny*(innerR+this.r*.15);wave(this.x,this.y,'#ffd166',36);emit(this.x,this.y,'#ffd166',12,.65);if(performance.now()-lastZoneLog>700){addLog(`${this.c.name} 受到巨大衝擊，翻上外層高坡！`);lastZoneLog=performance.now()}}else{this.x=cx+nx*(innerR-this.r*.72);this.y=cy+ny*(innerR-this.r*.72);const restitution=.86+this.c.d*.0008,reflected=Math.max(48,Math.abs(radial)*restitution);this.vx-=nx*(radial+reflected);this.vy-=ny*(radial+reflected);const tangentKick=10+this.c.s*.04;this.vx+=-ny*this.orbitDir*tangentKick;this.vy+=nx*this.orbitDir*tangentKick;this.energy-=Math.max(0,radial)*.009;this.rimCooldown=.11;wave(this.x,this.y,'#8fd8ff',30)}}if(this.zone==='outer'){if(dist<innerR-this.r*.4&&radial<0){this.zone='inner';this.rimCooldown=.2;wave(this.x,this.y,'#8fffc6',28)}if(dist>outerR-this.r*.35&&this.rimCooldown<=0){const escapeEnergy=radial+this.impactBoost*.42,escapeThreshold=278+this.c.w*.46+this.c.d*.34;if(escapeEnergy>escapeThreshold){this.out=true;emit(this.x,this.y,this.color,64,1.4);wave(this.x,this.y,this.color,64);addLog(`${this.c.name} 以極大速度翻出外層，正式出局！`)}else{this.x=cx+nx*(outerR-this.r*.75);this.y=cy+ny*(outerR-this.r*.75);const restitution=.91+this.c.d*.00045,reflected=Math.max(70,Math.abs(radial)*restitution);this.vx-=nx*(radial+reflected);this.vy-=ny*(radial+reflected);this.energy-=Math.max(0,radial)*.014;this.rimCooldown=.14;wave(this.x,this.y,'#ffd38b',36);if(performance.now()-lastZoneLog>700){addLog(`${this.c.name} 撞上外層高牆後彈回！`);lastZoneLog=performance.now()}}}}}
draw(){if(this.out||this.burst)return;this.trail.forEach((p,i)=>{const a=clamp(p.l,0,1)*(i/Math.max(1,this.trail.length))*.28;ctx.fillStyle=alpha(this.color,a);ctx.beginPath();ctx.arc(p.x,p.y,this.r*(.10+i/this.trail.length*.28),0,Math.PI*2);ctx.fill()});ctx.save();const wob=clamp((28-this.energy)/28,0,1)*3.2;ctx.translate(this.x+Math.sin(this.angle*.42)*wob,this.y+Math.cos(this.angle*.37)*wob);ctx.rotate(this.angle);ctx.shadowBlur=14;ctx.shadowColor=this.color;const spikes=this.c.shape==='shark'?10:this.c.shape==='wolf'?7:this.c.type==='attack'?9:8;ctx.beginPath();for(let i=0;i<spikes*2;i++){const a=i*Math.PI/spikes;let rr=i%2?this.r*.72:this.r;if(this.c.shape==='rod'&&i%4===0)rr*=.92;if(this.c.shape==='dragoon'||this.c.shape==='meteor')rr*=i%4===0?1.08:1;const px=Math.cos(a)*rr,py=Math.sin(a)*rr;i?ctx.lineTo(px,py):ctx.moveTo(px,py)}ctx.closePath();const g=ctx.createRadialGradient(-3,-4,1,0,0,this.r);g.addColorStop(0,'#fff');g.addColorStop(.24,this.color);g.addColorStop(1,'#070a12');ctx.fillStyle=g;ctx.fill();ctx.strokeStyle='#ffffff99';ctx.lineWidth=1.4;ctx.stroke();ctx.fillStyle='#09101d';ctx.beginPath();ctx.arc(0,0,this.r*.43,0,Math.PI*2);ctx.fill();ctx.strokeStyle=this.color;ctx.stroke();ctx.restore()}}
function alpha(hex,a){const h=hex.replace('#',''),n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function collide(a,b){if(a.out||b.out||a.burst||b.burst)return;const dx=b.x-a.x,dy=b.y-a.y,dist=mag(dx,dy),min=a.r+b.r;if(!dist||dist>=min)return;const nx=dx/dist,ny=dy/dist,overlap=min-dist;a.x-=nx*overlap/2;a.y-=ny*overlap/2;b.x+=nx*overlap/2;b.y+=ny*overlap/2;const rel=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;if(rel>0)return;const m1=a.c.w/55,m2=b.c.w/55;let impulse=-1.80*rel/(1/m1+1/m2);const attackFactor=1+(a.c.a+b.c.a)/520,oppositeSpin=a.c.spin!==b.c.spin;impulse*=attackFactor*(oppositeSpin?.93:1.04);a.vx-=impulse/m1*nx;a.vy-=impulse/m1*ny;b.vx+=impulse/m2*nx;b.vy+=impulse/m2*ny;const power=Math.abs(rel)+impulse*.13;a.impactBoost=Math.max(a.impactBoost,power*(b.c.a/100));b.impactBoost=Math.max(b.impactBoost,power*(a.c.a/100));a.energy-=power*(122-a.c.d)*b.c.a/310000;b.energy-=power*(122-b.c.d)*a.c.a/310000;if(oppositeSpin){const equalize=Math.min(1.8,power*.004),avg=(a.energy+b.energy)/2;a.energy+=(avg-a.energy)*equalize*.08;b.energy+=(avg-b.energy)*equalize*.08}a.burstMeter+=power*(122-a.c.b)/850;b.burstMeter+=power*(122-b.c.b)/850;emit((a.x+b.x)/2,(a.y+b.y)/2,'#fff',Math.min(28,7+power/9),.78);wave((a.x+b.x)/2,(a.y+b.y)/2,'#fff',clamp(power*.19,20,52));[a,b].forEach(t=>{if(t.burstMeter>88&&Math.random()<(t.burstMeter-84)/560){t.burst=true;emit(t.x,t.y,t.color,76,1.7);addLog(`${t.c.name} 被強烈撞擊後爆裂！`)}})}
function drawArena(){ctx.clearRect(0,0,W,H);const cx=W/2,cy=H/2,g=ctx.createRadialGradient(cx,cy,2,cx,cy,outerR*1.08);g.addColorStop(0,'#40577c');g.addColorStop(.26,'#2c4161');g.addColorStop(.57,'#17283f');g.addColorStop(.72,'#26354b');g.addColorStop(.87,'#121a2a');g.addColorStop(1,'#070a12');ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.fill();for(let i=1;i<=5;i++){const r=innerR*i/5;ctx.strokeStyle=`rgba(184,220,255,${.035+i*.018})`;ctx.lineWidth=1+(i===5?2:0);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke()}const well=ctx.createRadialGradient(cx,cy,0,cx,cy,innerR*.42);well.addColorStop(0,'rgba(100,255,198,.15)');well.addColorStop(1,'rgba(100,255,198,0)');ctx.fillStyle=well;ctx.beginPath();ctx.arc(cx,cy,innerR*.42,0,Math.PI*2);ctx.fill();ctx.save();ctx.shadowBlur=14;ctx.shadowColor='#7fcfff66';ctx.strokeStyle='#a9d8ffbb';ctx.lineWidth=7;ctx.beginPath();ctx.arc(cx,cy,innerR,0,Math.PI*2);ctx.stroke();ctx.restore();ctx.fillStyle='#ffc66b12';ctx.beginPath();ctx.arc(cx,cy,outerR-4,0,Math.PI*2);ctx.arc(cx,cy,innerR+6,0,Math.PI*2,true);ctx.fill();const edge=ctx.createLinearGradient(cx-outerR,cy,cx+outerR,cy);edge.addColorStop(0,'#41ccff');edge.addColorStop(.5,'#f4f7ff');edge.addColorStop(1,'#ff5879');ctx.strokeStyle=edge;ctx.lineWidth=10;ctx.beginPath();ctx.arc(cx,cy,outerR,0,Math.PI*2);ctx.stroke();ctx.font='700 11px system-ui';ctx.textAlign='center';ctx.fillStyle='#9dffcfaa';ctx.fillText('GRAVITY WELL',cx,cy+4);ctx.fillStyle='#dcecffaa';ctx.fillText('INNER RIDGE',cx,cy-innerR+22);ctx.fillStyle='#ffd38baa';ctx.fillText('OUTER HIGH WALL',cx,cy-outerR+22);waves.forEach(w=>{ctx.globalAlpha=clamp(w.l,0,1);ctx.strokeStyle=w.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.stroke()});ctx.globalAlpha=1;tops.forEach(t=>t.draw());particles.forEach(p=>{ctx.globalAlpha=clamp(p.l*2,0,1);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1}
function effects(dt){particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.96;p.vy*=.96;p.l-=dt});particles=particles.filter(p=>p.l>0);waves.forEach(w=>{w.r+=(w.max-w.r)*dt*8;w.l-=dt*2.5});waves=waves.filter(w=>w.l>0)}function bars(){if(!tops.length)return;$('#e1').style.width=clamp(tops[0].energy,0,100)+'%';$('#e2').style.width=clamp(tops[1].energy,0,100)+'%'}function result(){if(tops.length<2)return;const[a,b]=tops;let loser=-1,why='';if(a.burst){loser=0;why='爆裂勝利'}else if(b.burst){loser=1;why='爆裂勝利'}else if(a.out){loser=0;why='極限出界勝利'}else if(b.out){loser=1;why='極限出界勝利'}else if(a.energy<=0&&mag(a.vx,a.vy)<24){loser=0;why='持久勝利'}else if(b.energy<=0&&mag(b.vx,b.vy)<24){loser=1;why='持久勝利'}else if(time>80){loser=a.energy<b.energy?0:1;why='時間判定'}if(loser<0)return;const win=1-loser;running=false;paused=false;score[win]++;$('#s1').textContent=score[0];$('#s2').textContent=score[1];$('#start').disabled=false;$('#start').textContent='再戰一場';$('#pause').disabled=true;over.classList.remove('hide');over.innerHTML=`<div><div class="big" style="color:${tops[win].color}">${tops[win].c.name} 勝利</div><div class="small">${why}・${time.toFixed(1)} 秒</div></div>`;addLog(`${tops[win].c.name} 以「${why}」取得勝利！`)}function loop(ts){const dt=Math.min((ts-last)/1000||0,.022);last=ts;if(running&&!paused){time+=dt;tops[0].update(dt,tops[1]);tops[1].update(dt,tops[0]);collide(tops[0],tops[1]);effects(dt);bars();result()}else effects(dt);drawArena();requestAnimationFrame(loop)}
$('#start').onclick=()=>{tops=[new Top(0,cfg.p1),new Top(1,cfg.p2)];time=0;running=true;paused=false;particles=[];waves=[];$('#start').disabled=true;$('#pause').disabled=false;$('#pause').textContent='暫停';$('#n1').textContent=cfg.p1.name;$('#n2').textContent=cfg.p2.name;over.classList.remove('hide');over.innerHTML='<div><div class="big">3・2・1</div><div class="small">LET IT RIP!</div></div>';setTimeout(()=>over.classList.add('hide'),650);addLog(`${cfg.p1.name} ${cfg.p1.combo} 對決 ${cfg.p2.name} ${cfg.p2.combo}！`)};$('#pause').onclick=()=>{if(!running)return;paused=!paused;$('#pause').textContent=paused?'繼續':'暫停'};$('#reset').onclick=()=>{running=false;paused=false;tops=[];particles=[];waves=[];score=[0,0];$('#s1').textContent=$('#s2').textContent='0';$('#start').disabled=false;$('#start').textContent='開始戰鬥';$('#pause').disabled=true;$('#e1').style.width=$('#e2').style.width='100%';over.classList.remove('hide');over.innerHTML='<div><div class="big">READY</div><div class="small">選好陀螺後開始戰鬥</div></div>';addLog('模擬器已重置。可從左右兩側重新選擇競技熱門陀螺。')};requestAnimationFrame(loop);
</script>
