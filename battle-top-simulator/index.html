<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>旋刃競技場｜載入物理引擎</title>
<style>
html,body{margin:0;min-height:100%;background:#040711;color:#eef5ff;font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif}body{display:grid;place-items:center}.loading{text-align:center;padding:28px}.spinner{width:44px;height:44px;margin:0 auto 16px;border:4px solid #ffffff18;border-top-color:#50d8ff;border-radius:50%;animation:spin .8s linear infinite}.msg{color:#9fb0cf;font-size:14px}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading"><div class="spinner"></div><strong>載入剛體物理引擎</strong><div class="msg">T1 陀螺・發射點・角動量・X Dash</div></div>
<script>
(async()=>{
 const snapshot='https://raw.githubusercontent.com/xieyaozhong/LITTLE-GAME_spinwheel/f87bd6ff9020b1e0e7bb3723da7d372226b92999/battle-top-simulator/index.html';
 const response=await fetch(snapshot,{cache:'no-store'});
 if(!response.ok)throw new Error(`視覺快照載入失敗：${response.status}`);
 let html=await response.text();
 const scripts='<scr'+'ipt src="physics-core.js?v=10"></scr'+'ipt><scr'+'ipt src="presets-launch.js?v=10"></scr'+'ipt><scr'+'ipt src="physics-runtime.js?v=10"></scr'+'ipt><scr'+'ipt src="rod-breaker.js?v=10"></scr'+'ipt><scr'+'ipt src="wooden-top-counter.js?v=10"></scr'+'ipt><scr'+'ipt src="preset-zh-tw.js?v=10"></scr'+'ipt><scr'+'ipt src="split-top.js?v=2"></scr'+'ipt><scr'+'ipt src="twin-survivor.js?v=1"></scr'+'ipt><scr'+'ipt src="sky-pouncer.js?v=2"></scr'+'ipt><scr'+'ipt src="sky-pouncer-endurance.js?v=2"></scr'+'ipt><scr'+'ipt src="phase-cloak.js?v=1"></scr'+'ipt><scr'+'ipt src="charm-siren.js?v=2"></scr'+'ipt><scr'+'ipt src="twin-charm-betrayal.js?v=1"></scr'+'ipt><scr'+'ipt src="rage-berserker.js?v=2"></scr'+'ipt><scr'+'ipt src="rage-targeting.js?v=3"></scr'+'ipt><scr'+'ipt src="rage-counterplay-fix.js?v=1"></scr'+'ipt><scr'+'ipt src="adaptive-morph.js?v=3"></scr'+'ipt><scr'+'ipt src="rage-disassembly.js?v=2"></scr'+'ipt><scr'+'ipt src="omni-observer-activate.js?v=1"></scr'+'ipt><scr'+'ipt src="taiji-mystic-wheel-v2.js?v=20260720a"></scr'+'ipt><scr'+'ipt src="taiji-rotation-visual.js?v=20260720c"></scr'+'ipt><scr'+'ipt src="taiji-center-gravity-fix.js?v=20260720b"></scr'+'ipt><scr'+'ipt src="seven-sword-master.js?v=2"></scr'+'ipt><scr'+'ipt src="seven-sword-refinement.js?v=1"></scr'+'ipt><scr'+'ipt src="seven-sword-speed-cap.js?v=1"></scr'+'ipt><scr'+'ipt src="chrono-clock-emperor.js?v=2"></scr'+'ipt><scr'+'ipt src="chrono-name-override.js?v=2"></scr'+'ipt><scr'+'ipt src="combat-clash-system.js?v=1"></scr'+'ipt><scr'+'ipt src="sky-pouncer-stamina-loss-fix.js?v=2"></scr'+'ipt><scr'+'ipt src="worldpress-colossus.js?v=1"></scr'+'ipt><scr'+'ipt src="worldpress-quake.js?v=3"></scr'+'ipt><scr'+'ipt src="relay-battle-mode.js?v=2"></scr'+'ipt><scr'+'ipt src="relay-lineup-layout.js?v=2"></scr'+'ipt><scr'+'ipt src="relay-team-synergy.js?v=2"></scr'+'ipt><scr'+'ipt src="relay-bond-visual-enhancement.js?v=2"></scr'+'ipt><scr'+'ipt src="ui-cleanup.js?v=2"></scr'+'ipt>';
 html=html.replace('</body>',scripts+'</body>');
 document.open();document.write(html);document.close();
})().catch(error=>{
 document.body.innerHTML='<div class="loading"><strong>載入失敗</strong><div class="msg"></div></div>';
 document.querySelector('.msg').textContent=error.message;
 console.error(error);
});
</script>
</body>
</html>
