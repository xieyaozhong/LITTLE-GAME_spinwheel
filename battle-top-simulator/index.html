<style>
:root{color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#050711;color:#f5f7ff;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Noto Sans TC",sans-serif}body{display:grid;place-items:center;overflow:hidden}.loading{width:min(420px,calc(100vw - 40px));padding:32px;text-align:center;border:1px solid #ffffff17;border-radius:28px;background:linear-gradient(145deg,#121a2bcc,#080c17e8);box-shadow:0 28px 90px #000b,inset 0 1px #ffffff12}.mark{width:72px;height:72px;margin:0 auto 18px;border-radius:50%;background:conic-gradient(from 15deg,#52ddff,#fff 8%,#7c5cff 18%,#111a2a 27%,#ff4f83 42%,#fff 52%,#52ddff 68%,#0c1220 80%,#ffcf70);box-shadow:0 0 34px #4bdfff55,inset 0 0 0 12px #090f1ddd;animation:spin .9s linear infinite}.eyebrow{color:#7fe6ff;font-size:11px;font-weight:900;letter-spacing:.22em}.loading strong{display:block;margin-top:8px;font-size:24px;letter-spacing:.08em}.msg{margin-top:8px;color:#99a9c5;font-size:13px;line-height:1.6}.track{height:3px;margin-top:22px;border-radius:99px;background:#ffffff0e;overflow:hidden}.track:after{content:"";display:block;width:42%;height:100%;border-radius:inherit;background:linear-gradient(90deg,#45d9ff,#9c78ff,#ff5a8b);box-shadow:0 0 14px #62dcff;animation:load 1.2s ease-in-out infinite alternate}@keyframes spin{to{transform:rotate(360deg)}}@keyframes load{from{transform:translateX(-80%)}to{transform:translateX(240%)}}@media(prefers-reduced-motion:reduce){.mark,.track:after{animation-duration:4s}}
</style>
</head>
<body>
<div class="loading" role="status" aria-live="polite"><div class="mark"></div><div class="eyebrow">ARENA SYSTEM</div><strong>旋刃競技場</strong><div class="msg">正在校準戰鬥盤與陀螺動態特效</div><div class="track"></div></div>

 const scripts='<scr'+'ipt src="physics-core.js?v=10"></scr'+'ipt><scr'+'ipt src="presets-launch.js?v=10"></scr'+'ipt><scr'+'ipt src="physics-runtime.js?v=10"></scr'+'ipt><scr'+'ipt src="rod-breaker.js?v=10"></scr'+'ipt><scr'+'ipt src="wooden-top-counter.js?v=10"></scr'+'ipt><scr'+'ipt src="preset-zh-tw.js?v=10"></scr'+'ipt><scr'+'ipt src="split-top.js?v=2"></scr'+'ipt><scr'+'ipt src="twin-survivor.js?v=1"></scr'+'ipt><scr'+'ipt src="sky-pouncer.js?v=2"></scr'+'ipt><scr'+'ipt src="sky-pouncer-endurance.js?v=2"></scr'+'ipt><scr'+'ipt src="phase-cloak.js?v=1"></scr'+'ipt><scr'+'ipt src="charm-siren.js?v=2"></scr'+'ipt><scr'+'ipt src="twin-charm-betrayal.js?v=1"></scr'+'ipt><scr'+'ipt src="rage-berserker.js?v=2"></scr'+'ipt><scr'+'ipt src="rage-targeting.js?v=3"></scr'+'ipt><scr'+'ipt src="rage-counterplay-fix.js?v=1"></scr'+'ipt><scr'+'ipt src="adaptive-morph.js?v=3"></scr'+'ipt><scr'+'ipt src="rage-disassembly.js?v=2"></scr'+'ipt><scr'+'ipt src="omni-observer-activate.js?v=1"></scr'+'ipt><scr'+'ipt src="taiji-mystic-wheel-v2.js?v=20260720a"></scr'+'ipt><scr'+'ipt src="taiji-rotation-visual.js?v=20260720c"></scr'+'ipt><scr'+'ipt src="taiji-center-gravity-fix.js?v=20260720b"></scr'+'ipt><scr'+'ipt src="seven-sword-master.js?v=2"></scr'+'ipt><scr'+'ipt src="seven-sword-refinement.js?v=1"></scr'+'ipt><scr'+'ipt src="seven-sword-speed-cap.js?v=1"></scr'+'ipt><scr'+'ipt src="chrono-clock-emperor.js?v=2"></scr'+'ipt><scr'+'ipt src="chrono-name-override.js?v=2"></scr'+'ipt><scr'+'ipt src="combat-clash-system.js?v=1"></scr'+'ipt><scr'+'ipt src="sky-pouncer-stamina-loss-fix.js?v=2"></scr'+'ipt><scr'+'ipt src="worldpress-colossus.js?v=1"></scr'+'ipt><scr'+'ipt src="worldpress-quake.js?v=3"></scr'+'ipt><scr'+'ipt src="relay-battle-mode.js?v=2"></scr'+'ipt><scr'+'ipt src="relay-lineup-layout.js?v=2"></scr'+'ipt><scr'+'ipt src="relay-team-synergy.js?v=2"></scr'+'ipt><scr'+'ipt src="relay-bond-visual-enhancement.js?v=2"></scr'+'ipt><scr'+'ipt src="ui-cleanup.js?v=2"></scr'+'ipt><scr'+'ipt src="effects-v3.js?v=1"></scr'+'ipt><scr'+'ipt src="interface-v3.js?v=1"></scr'+'ipt>';
 html=html.replace('</head>',styles+'</head>').replace('</body>',scripts+'</body>');
 document.open();document.write(html);document.close();
})().catch(error=>{
 document.querySelector('.msg').textContent=error.message;
 document.querySelector('.track').remove();
 console.error(error);
});
