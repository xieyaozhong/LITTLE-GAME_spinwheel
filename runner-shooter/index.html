<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>大福衝衝衝</title>
  <style>
    :root{--ink:#3a2340;--cream:#fff8df;--pink:#ff8fa8;--mint:#7ad7b8;--yellow:#ffd76a}
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#201a35;color:#fff;font-family:"Courier New","Noto Sans TC",monospace;touch-action:none;user-select:none}
    body{display:grid;place-items:center}
    .shell{position:relative;width:min(100vw,480px);height:100vh;overflow:hidden;background:#7dcde8;box-shadow:0 0 0 4px #3a2340,0 0 40px #0008}
    canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
    .hud{position:absolute;z-index:3;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;display:flex;justify-content:space-between;gap:8px;pointer-events:none}
    .pixel-box{background:#fff8df;border:4px solid #3a2340;box-shadow:4px 4px 0 #0005;color:#3a2340;padding:7px 10px;font-size:13px;font-weight:900;line-height:1;white-space:nowrap}
    .stats{position:absolute;z-index:3;top:max(54px,calc(env(safe-area-inset-top) + 50px));left:50%;transform:translateX(-50%);pointer-events:none;text-align:center;font-size:11px}
    .overlay{position:absolute;z-index:10;inset:0;display:grid;place-items:center;padding:18px;background:rgba(28,22,50,.66)}
    .panel{width:min(92%,390px);background:#fff8df;border:6px solid #3a2340;box-shadow:8px 8px 0 #0006;padding:22px 18px;text-align:center;color:#3a2340}
    .logo{margin:0;font-size:clamp(30px,9vw,48px);line-height:1;text-shadow:4px 4px 0 #ffb0bf;letter-spacing:-2px}
    .subtitle{margin:14px 0 18px;line-height:1.7;font-weight:700;font-size:14px}
    .pixel-btn{appearance:none;border:4px solid #3a2340;background:#ffd76a;color:#3a2340;padding:12px 22px;font:900 18px "Courier New","Noto Sans TC",monospace;box-shadow:5px 5px 0 #8f5f4a;cursor:pointer}
    .pixel-btn:active{transform:translate(4px,4px);box-shadow:1px 1px 0 #8f5f4a}
    .tiny{font-size:12px;opacity:.8;margin-top:12px}
    .hide{display:none!important}
  </style>
</head>
<body>
<main class="shell">
  <canvas id="game" width="360" height="640" aria-label="大福像素跑酷射擊遊戲"></canvas>
  <div class="hud">
    <div class="pixel-box">紅豆 <span id="coins">0</span></div>
    <div class="pixel-box">距離 <span id="distance">0</span>m</div>
  </div>
  <div class="pixel-box stats" id="stats">豆餡彈 1｜連發 5.0｜分身 1｜愛心 3</div>

  <section class="overlay" id="startScreen">
    <div class="panel">
      <h1 class="logo">大福衝衝衝</h1>
      <p class="subtitle">拖曳大福左右移動<br>自動發射紅豆，打倒壞脾氣甜點<br>穿過升級鳥居讓大福越來越強</p>
      <button class="pixel-btn" id="startBtn">開始冒險</button>
      <div class="tiny">手機拖曳｜電腦 A D 或方向鍵</div>
    </div>
  </section>

  <section class="overlay hide" id="gameOverScreen">
    <div class="panel">
      <h2 class="logo" id="resultTitle">大福扁掉了</h2>
      <p class="subtitle">跑了 <b id="finalDistance">0</b> 公尺<br>收集 <b id="finalCoins">0</b> 顆紅豆</p>
      <button class="pixel-btn" id="restartBtn">再蒸一顆</button>
    </div>
  </section>
</main>
<script>
(function(){
  'use strict';

  var canvas=document.getElementById('game');
  var ctx=canvas.getContext('2d');
  ctx.imageSmoothingEnabled=false;

  var W=360,H=640,MAX_Z=110;
  var running=false,lastTime=0,distance=0,coins=0,worldSpeed=22;
  var shootTimer=0,spawnTimer=0,gateTimer=7,bossTimer=24;
  var dragging=false,screenShake=0,whiteFlash=0,combo=0,comboTimer=0;
  var bullets=[],enemies=[],gates=[],particles=[],floatTexts=[],roadTiles=[],clouds=[];

  var player={x:0,targetX:0,hp:3,maxHp:5,damage:1,fireRate:5,bulletCount:1,shield:0,invincible:0};

  function id(name){return document.getElementById(name)}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
  function lerp(a,b,t){return a+(b-a)*t}
  function rand(a,b){return a+Math.random()*(b-a)}
  function ir(v){return Math.round(v)}

  function resetWorldDecor(){
    roadTiles=[];
    for(var i=0;i<26;i++) roadTiles.push({z:i*(MAX_Z/26),lane:i%3-1});
    clouds=[];
    for(i=0;i<7;i++) clouds.push({x:Math.floor(Math.random()*W),y:40+Math.floor(Math.random()*100),s:Math.floor(rand(1,3)),speed:rand(2,6)});
  }

  function project(x,z){
    var depth=clamp(1-z/MAX_Z,0,1);
    var curve=Math.pow(depth,1.45);
    var roadHalf=lerp(30,190,curve);
    return {x:W/2+x*roadHalf,y:lerp(145,525,curve),s:lerp(.18,1.08,curve),depth:depth,roadHalf:roadHalf};
  }

  function rect(x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(ir(x),ir(y),Math.max(1,ir(w)),Math.max(1,ir(h)))}
  function outlineRect(x,y,w,h,fill,outline,thick){
    thick=thick||3;
    rect(x-thick,y-thick,w+thick*2,h+thick*2,outline);
    rect(x,y,w,h,fill);
  }
  function pixelText(text,x,y,size,color,align){
    ctx.save();
    ctx.font='900 '+size+'px "Courier New","Noto Sans TC",monospace';
    ctx.textAlign=align||'center';
    ctx.textBaseline='middle';
    ctx.fillStyle='#3a2340';
    ctx.fillText(text,ir(x+2),ir(y+2));
    ctx.fillStyle=color||'#fff8df';
    ctx.fillText(text,ir(x),ir(y));
    ctx.restore();
  }

  function updateHud(){
    id('coins').textContent=coins;
    id('distance').textContent=Math.floor(distance);
    id('stats').textContent='豆餡彈 '+player.damage+'｜連發 '+player.fireRate.toFixed(1)+'｜分身 '+player.bulletCount+'｜愛心 '+player.hp+(player.shield>0?'｜護盾':'');
  }

  function resetGame(){
    distance=0;coins=0;worldSpeed=22;shootTimer=0;spawnTimer=.8;gateTimer=6.5;bossTimer=23;
    screenShake=0;whiteFlash=0;combo=0;comboTimer=0;
    bullets=[];enemies=[];gates=[];particles=[];floatTexts=[];
    player.x=0;player.targetX=0;player.hp=3;player.damage=1;player.fireRate=5;player.bulletCount=1;player.shield=0;player.invincible=0;
    resetWorldDecor();
    updateHud();
  }

  function startGame(){
    resetGame();
    running=true;
    lastTime=performance.now();
    id('startScreen').classList.add('hide');
    id('gameOverScreen').classList.add('hide');
    requestAnimationFrame(loop);
  }

  function endGame(title){
    running=false;
    id('resultTitle').textContent=title||'大福扁掉了';
    id('finalDistance').textContent=Math.floor(distance);
    id('finalCoins').textContent=coins;
    id('gameOverScreen').classList.remove('hide');
  }

  function addText(text,x,y,color,size){floatTexts.push({text:text,x:x,y:y,color:color||'#fff8df',size:size||18,life:.8})}
  function burst(x,y,color,count,power){
    count=count||16;power=power||100;
    for(var i=0;i<count;i++){
      var a=Math.random()*Math.PI*2,v=rand(20,power);
      particles.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,size:Math.floor(rand(2,6)),life:rand(.25,.7),color:color});
    }
  }

  function spawnEnemy(boss){
    if(boss){
      var bossHp=Math.floor(60+distance*.18);
      enemies.push({x:0,z:MAX_Z+4,hp:bossHp,maxHp:bossHp,size:1.55,type:'boss',color:'#8bcf75',reward:24,wobble:0});
      return;
    }
    var lanes=[-.66,0,.66];
    var count=Math.random()<.33?2:1;
    var used={};
    for(var i=0;i<count;i++){
      var lane;
      do{lane=lanes[Math.floor(Math.random()*lanes.length)]}while(used[lane]);
      used[lane]=true;
      var hp=Math.max(3,Math.floor(5+distance*.04+Math.random()*8));
      var types=['anko','matcha','strawberry'];
      enemies.push({x:lane,z:MAX_Z+i*4,hp:hp,maxHp:hp,size:rand(.72,.9),type:types[Math.floor(Math.random()*types.length)],reward:Math.ceil(hp/4),wobble:Math.random()*6.28});
    }
  }

  function spawnGate(){
    var pairs=[
      [['+1 分身','bullet',1,'#6cd4ff'],['+1 豆餡','damage',1,'#ffbc5c']],
      [['+35% 連發','rate',.35,'#73d6a4'],['+1 愛心','hp',1,'#ff8fa8']],
      [['+2 豆餡','damage',2,'#ff9f50'],['護盾','shield',1,'#c39bff']],
      [['+1 分身','bullet',1,'#6cd4ff'],['+50% 連發','rate',.5,'#73d6a4']]
    ];
    var pair=pairs[Math.floor(Math.random()*pairs.length)];
    gates.push({z:MAX_Z,left:pair[0],right:pair[1],used:false});
  }

  function shoot(){
    for(var i=0;i<player.bulletCount;i++){
      bullets.push({x:player.x+(i-(player.bulletCount-1)/2)*.16,z:3,speed:72,alive:true,damage:player.damage});
    }
  }

  function applyUpgrade(o){
    if(o[1]==='bullet') player.bulletCount=Math.min(5,player.bulletCount+o[2]);
    if(o[1]==='damage') player.damage+=o[2];
    if(o[1]==='rate') player.fireRate=Math.min(13,player.fireRate*(1+o[2]));
    if(o[1]==='hp') player.hp=Math.min(player.maxHp,player.hp+o[2]);
    if(o[1]==='shield') player.shield=1;
    whiteFlash=.18;screenShake=4;
    addText(o[0],W/2,285,o[3],24);
    burst(W/2,330,o[3],30,150);
    updateHud();
  }

  function damagePlayer(){
    if(player.invincible>0) return;
    if(player.shield>0){
      player.shield=0;
      player.invincible=.7;
      var sp=project(player.x,0);
      addText('護盾破裂!',sp.x,445,'#c39bff',20);
      burst(sp.x,505,'#c39bff',28,160);
    }else{
      player.hp--;
      player.invincible=1.1;
      var p=project(player.x,0);
      addText('-1 愛心',p.x,445,'#ff718f',20);
      burst(p.x,505,'#ff718f',26,150);
      if(player.hp<=0){updateHud();endGame('大福扁掉了');return;}
    }
    screenShake=12;whiteFlash=.25;updateHud();
  }

  function update(dt){
    distance+=worldSpeed*dt*.72;
    worldSpeed=Math.min(36,22+distance*.013);
    player.invincible=Math.max(0,player.invincible-dt);
    player.x+=(player.targetX-player.x)*Math.min(1,dt*13);
    player.x=clamp(player.x,-.88,.88);
    comboTimer-=dt;if(comboTimer<=0)combo=0;

    shootTimer-=dt;
    if(shootTimer<=0){shoot();shootTimer=1/player.fireRate;}
    spawnTimer-=dt;
    if(spawnTimer<=0){spawnEnemy(false);spawnTimer=Math.max(.72,1.65-distance*.0014)*rand(.82,1.25);}
    gateTimer-=dt;
    if(gateTimer<=0){spawnGate();gateTimer=10+Math.random()*5;}
    bossTimer-=dt;
    if(bossTimer<=0){spawnEnemy(true);bossTimer=30+Math.random()*8;}

    var i,j;
    for(i=0;i<roadTiles.length;i++){roadTiles[i].z-=worldSpeed*dt;if(roadTiles[i].z<0)roadTiles[i].z+=MAX_Z;}
    for(i=0;i<clouds.length;i++){clouds[i].x+=clouds[i].speed*dt;if(clouds[i].x>W+40)clouds[i].x=-60;}
    for(i=0;i<bullets.length;i++){bullets[i].z+=bullets[i].speed*dt;if(bullets[i].z>MAX_Z+14)bullets[i].alive=false;}
    for(i=0;i<enemies.length;i++){enemies[i].z-=worldSpeed*dt;enemies[i].wobble+=dt*2.5;}
    for(i=0;i<gates.length;i++)gates[i].z-=worldSpeed*dt;

    for(i=0;i<bullets.length;i++){
      var b=bullets[i];
      if(!b.alive)continue;
      for(j=0;j<enemies.length;j++){
        var e=enemies[j];
        var hitWidth=e.type==='boss' ? 0.57 : 0.34*e.size;
        if(Math.abs(b.z-e.z)<3.6&&Math.abs(b.x-e.x)<hitWidth){
          b.alive=false;e.hp-=b.damage;
          var hit=project(e.x,e.z);
          burst(hit.x,hit.y-12,'#ffca4f',5,65);
          addText('-'+b.damage,hit.x,hit.y-24,'#fff8df',14);
          break;
        }
      }
    }

    for(i=enemies.length-1;i>=0;i--){
      var enemy=enemies[i];
      if(enemy.hp<=0){
        var ep=project(enemy.x,enemy.z);
        combo++;comboTimer=2;
        var reward=enemy.reward+Math.floor(combo/5);
        coins+=reward;
        addText('+'+reward+(combo>=5?' 連擊!':''),ep.x,ep.y-28,'#ffd76a',enemy.type==='boss'?26:18);
        burst(ep.x,ep.y,enemy.type==='boss'?'#8bcf75':'#ff8fa8',enemy.type==='boss'?50:24,enemy.type==='boss'?220:130);
        screenShake=enemy.type==='boss'?12:4;
        enemies.splice(i,1);updateHud();continue;
      }
      if(enemy.z<=1.5){
        var width=enemy.type==='boss' ? 0.62 : 0.39*enemy.size;
        if(Math.abs(enemy.x-player.x)<width)damagePlayer();
        enemies.splice(i,1);
      }
    }

    for(i=gates.length-1;i>=0;i--){
      var g=gates[i];
      if(g.z<=2&&!g.used){g.used=true;applyUpgrade(player.x<0?g.left:g.right);}
      if(g.z<-5)gates.splice(i,1);
    }

    bullets=bullets.filter(function(v){return v.alive;});
    for(i=particles.length-1;i>=0;i--){
      var q=particles[i];q.x+=q.vx*dt;q.y+=q.vy*dt;q.vx*=.96;q.vy*=.96;q.life-=dt;if(q.life<=0)particles.splice(i,1);
    }
    for(i=floatTexts.length-1;i>=0;i--){floatTexts[i].y-=38*dt;floatTexts[i].life-=dt;if(floatTexts[i].life<=0)floatTexts.splice(i,1);}
    screenShake*=.82;whiteFlash=Math.max(0,whiteFlash-dt);
  }

  function drawSky(){
    rect(0,0,W,H,'#79cfe9');
    rect(0,138,W,H-138,'#8ed276');
    rect(286,54,34,34,'#ffe785');rect(292,48,22,46,'#ffe785');rect(280,60,46,22,'#ffe785');
    for(var i=0;i<clouds.length;i++){
      var c=clouds[i],s=c.s*4;
      rect(c.x,c.y+s,s*7,s*2,'#eafaff');rect(c.x+s,c.y,s*4,s*4,'#eafaff');rect(c.x+s*4,c.y+s,s*3,s*3,'#eafaff');
    }
    rect(0,118,W,28,'#68b96d');
    for(i=0;i<12;i++){
      var mx=i*34-18,my=118-(i%3)*10;
      rect(mx,my,42,28,'#5aa35f');rect(mx+8,my-10,24,16,'#5aa35f');
    }
  }

  function drawRoad(){
    ctx.fillStyle='#c38f68';ctx.beginPath();ctx.moveTo(148,145);ctx.lineTo(348,640);ctx.lineTo(12,640);ctx.lineTo(212,145);ctx.closePath();ctx.fill();
    ctx.fillStyle='#f1c994';ctx.beginPath();ctx.moveTo(155,145);ctx.lineTo(326,640);ctx.lineTo(34,640);ctx.lineTo(205,145);ctx.closePath();ctx.fill();
    for(var i=0;i<roadTiles.length;i++){
      var t=roadTiles[i],p=project(t.lane*.47,t.z),s=Math.max(2,12*p.s);
      var checker=(Math.floor((t.z+distance)/7)+t.lane)%2===0?'#fff0c6':'#e9b97e';
      rect(p.x-s/2,p.y-s/2,s,s,checker);
    }
    rect(8,548,26,92,'#71bd68');rect(326,548,26,92,'#71bd68');
    for(i=0;i<8;i++){rect(8+i%2*8,556+i*11,8,8,'#e6f3a1');rect(340-i%2*8,556+i*11,8,8,'#e6f3a1');}
  }

  function drawDaifuku(x,y,s){
    s=Math.max(.35,s);
    var u=Math.max(1,Math.round(4*s));
    ctx.save();ctx.translate(ir(x),ir(y));
    rect(-8*u,5*u,16*u,3*u,'#0005');
    rect(-7*u,-3*u,14*u,9*u,'#3a2340');
    rect(-6*u,-4*u,12*u,9*u,'#fff8df');
    rect(-5*u,-5*u,10*u,2*u,'#fff8df');
    rect(-6*u,-1*u,12*u,3*u,'#fffdf3');
    rect(-4*u,-5*u,8*u,1*u,'#ff6f7f');
    rect(-5*u,-6*u,2*u,2*u,'#ff6f7f');rect(3*u,-6*u,2*u,2*u,'#ff6f7f');
    rect(-3*u,-1*u,1*u,2*u,'#3a2340');rect(2*u,-1*u,1*u,2*u,'#3a2340');
    rect(-1*u,1*u,2*u,1*u,'#8e4d5a');
    rect(-5*u,1*u,2*u,1*u,'#ff9caf');rect(3*u,1*u,2*u,1*u,'#ff9caf');
    rect(-2*u,-8*u,4*u,4*u,'#3a2340');rect(-1*u,-10*u,2*u,3*u,'#ffca4f');
    ctx.restore();
  }

  function drawEnemy(e){
    var p=project(e.x+Math.sin(e.wobble)*.01,e.z);if(!p.depth)return;
    var s=e.size*p.s;
    if(e.type==='boss'){drawBoss(p.x,p.y-20*p.s,s);return;}
    var u=Math.max(1,Math.round(4*s));
    ctx.save();ctx.translate(ir(p.x),ir(p.y-8*p.s));
    var body=e.type==='matcha'?'#a8d37d':e.type==='strawberry'?'#ff9eb4':'#d88a66';
    rect(-7*u,-5*u,14*u,11*u,'#3a2340');rect(-6*u,-6*u,12*u,11*u,body);rect(-4*u,-7*u,8*u,2*u,body);
    rect(-4*u,-2*u,2*u,1*u,'#3a2340');rect(2*u,-2*u,2*u,1*u,'#3a2340');
    rect(-3*u,1*u,6*u,1*u,'#3a2340');rect(-1*u,2*u,2*u,1*u,'#3a2340');
    ctx.restore();
    pixelText(String(Math.max(0,Math.ceil(e.hp))),p.x,p.y-44*p.s,Math.max(10,Math.round(20*p.s)),'#fff8df');
  }

  function drawBoss(x,y,s){
    var u=Math.max(1,Math.round(5*s));
    ctx.save();ctx.translate(ir(x),ir(y));
    rect(-9*u,-7*u,18*u,14*u,'#3a2340');rect(-8*u,-8*u,16*u,14*u,'#a8d37d');rect(-6*u,-9*u,12*u,2*u,'#a8d37d');
    rect(-5*u,-2*u,2*u,2*u,'#3a2340');rect(3*u,-2*u,2*u,2*u,'#3a2340');rect(-3*u,2*u,6*u,2*u,'#3a2340');
    rect(-8*u,-11*u,16*u,2*u,'#ff6f7f');rect(-8*u,-13*u,3*u,3*u,'#ff6f7f');rect(5*u,-13*u,3*u,3*u,'#ff6f7f');
    ctx.restore();
  }

  function drawEnemyHp(e){
    if(e.type!=='boss')return;
    var p=project(e.x,e.z),w=100*p.s;
    outlineRect(p.x-w/2,p.y-82*p.s,w,8*p.s,'#52354d','#3a2340',2);
    rect(p.x-w/2+2,p.y-82*p.s+2,(w-4)*(e.hp/e.maxHp),Math.max(2,8*p.s-4),'#8be28d');
    pixelText(String(Math.max(0,Math.ceil(e.hp))),p.x,p.y-62*p.s,Math.max(12,Math.round(22*p.s)),'#fff8df');
  }

  function drawBullet(b){
    var p=project(b.x,b.z);if(!p.depth)return;
    var s=Math.max(2,Math.round(6*p.s));
    rect(p.x-s/2,p.y-s/2,s,s,'#3a2340');rect(p.x-s/2+1,p.y-s/2+1,Math.max(1,s-2),Math.max(1,s-2),'#b24f4d');
  }

  function drawGate(g){
    var p=project(0,g.z);if(!p.depth)return;
    var total=p.roadHalf*1.75,gap=4*p.s,h=105*p.s,y=p.y-h,half=total/2-gap;
    drawGateSide(W/2-total/2,y,half,h,g.left,p.s);
    drawGateSide(W/2+gap,y,half,h,g.right,p.s);
  }

  function drawGateSide(x,y,w,h,o,s){
    var frame=o[3];
    outlineRect(x,y,w,h,'#fff8df','#3a2340',Math.max(2,Math.round(3*s)));
    rect(x,y,Math.max(4,8*s),h,frame);rect(x+w-Math.max(4,8*s),y,Math.max(4,8*s),h,frame);rect(x,y,w,Math.max(4,8*s),frame);
    pixelText(o[0],x+w/2,y+h*.58,Math.max(8,Math.round(15*s)),frame);
  }

  function drawParticles(){
    for(var i=0;i<particles.length;i++){var p=particles[i];ctx.globalAlpha=clamp(p.life*2,0,1);rect(p.x,p.y,p.size,p.size,p.color);}ctx.globalAlpha=1;
  }
  function drawTexts(){
    for(var i=0;i<floatTexts.length;i++){var t=floatTexts[i];ctx.globalAlpha=clamp(t.life*1.6,0,1);pixelText(t.text,t.x,t.y,t.size,t.color);}ctx.globalAlpha=1;
  }

  function draw(){
    ctx.save();
    if(screenShake>.3)ctx.translate(ir((Math.random()-.5)*screenShake),ir((Math.random()-.5)*screenShake));
    drawSky();drawRoad();
    var all=[];
    gates.forEach(function(v){all.push({z:v.z,type:'gate',v:v})});
    enemies.forEach(function(v){all.push({z:v.z,type:'enemy',v:v})});
    bullets.forEach(function(v){all.push({z:v.z,type:'bullet',v:v})});
    all.sort(function(a,b){return b.z-a.z});
    for(var i=0;i<all.length;i++){
      if(all[i].type==='gate')drawGate(all[i].v);
      else if(all[i].type==='enemy'){drawEnemy(all[i].v);drawEnemyHp(all[i].v);}
      else drawBullet(all[i].v);
    }
    var pp=project(player.x,0);
    if(!(player.invincible>0&&Math.floor(player.invincible*14)%2===0))drawDaifuku(pp.x,525,1);
    if(player.shield>0){ctx.strokeStyle='#c39bff';ctx.lineWidth=4;ctx.strokeRect(ir(pp.x-38),ir(475),76,74);}
    drawParticles();drawTexts();
    if(combo>=3)pixelText('COMBO x'+combo,W/2,110,18,'#ffd76a');
    if(whiteFlash>0){ctx.globalAlpha=whiteFlash;rect(0,0,W,H,'#fff');ctx.globalAlpha=1;}
    ctx.restore();
  }

  function loop(now){
    if(!running)return;
    var dt=Math.min((now-lastTime)/1000,.034);lastTime=now;
    update(dt);draw();
    if(running)requestAnimationFrame(loop);
  }

  function pointerToTarget(clientX){
    var r=canvas.getBoundingClientRect();
    var nx=(clientX-r.left)/r.width;
    player.targetX=clamp((nx-.5)*2,-.88,.88);
  }

  canvas.addEventListener('pointerdown',function(e){dragging=true;if(canvas.setPointerCapture)canvas.setPointerCapture(e.pointerId);pointerToTarget(e.clientX);});
  canvas.addEventListener('pointermove',function(e){if(dragging)pointerToTarget(e.clientX);});
  canvas.addEventListener('pointerup',function(){dragging=false;});
  canvas.addEventListener('pointercancel',function(){dragging=false;});
  window.addEventListener('keydown',function(e){
    if(e.code==='ArrowLeft'||e.code==='KeyA')player.targetX-=.18;
    if(e.code==='ArrowRight'||e.code==='KeyD')player.targetX+=.18;
    player.targetX=clamp(player.targetX,-.88,.88);
  });

  id('startBtn').addEventListener('click',startGame);
  id('restartBtn').addEventListener('click',startGame);
  resetWorldDecor();updateHud();draw();
})();
</script>
</body>
</html>
